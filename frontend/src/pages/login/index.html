<!DOCTYPE html>
<html class="light" lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ae2f34",
          "primary-container": "#ff6b6b",
          "secondary": "#006a65",
          "surface": "#fff8f7",
          "on-surface": "#251818",
          "on-surface-variant": "#584140",
          "surface-container-low": "#fff0ef",
          "surface-container-lowest": "#ffffff",
          "outline-variant": "#e0bfbd"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"}
      }
    }
  }
</script>
<style>
  body { background: linear-gradient(135deg, #fff8f7 0%, #fff0ef 100%); min-height: 100dvh; }
  .glass-effect { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="font-body text-on-surface min-h-screen flex items-center justify-center p-6">

<main class="w-full max-w-[450px] relative">
  <div class="glass-effect rounded-lg p-8 md:p-12 shadow-[0_20px_50px_rgba(255,107,107,0.12)] border border-white/50 relative z-10">
    
    <div class="flex flex-col items-center mb-10 text-center">
      <img alt="Logo Delicitas" class="w-24 h-24 object-contain mb-4" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDuOw8vYOx_RetURl_1Dp1vkNj2j3WtRPRbcENlUHoCDb059048S3oqOSiE_1ia5GIpXCduTjGcjhTe6QoUTK34Uk3TR4piRu2trwtnBfYR_xHoS4cJIkI8YhXuqvMQXU4ik8Jr493bLNNSOxpYo19A3tYrxKT5kBQBTkuJ24ECGeqUmK30UqDJ6qqR_rwU1L57jf60xVAuCGeQoF5vbIO5HhhxTz6B1wI-FrQUJIHaXKL-Cm_crBTfqitdR0i21OimCB2Oi3UTEPEv"/>
      <h1 class="font-headline text-3xl font-extrabold tracking-tight">Bem-vindo(a)</h1>
      <p class="text-on-surface-variant text-sm mt-2">Entre para saborear nossas delícias</p>
    </div>

    <form id="login-form" class="space-y-6">
      <div class="space-y-2">
        <label class="text-sm font-semibold text-on-surface-variant">Email</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">mail</span>
          <input id="email" type="email" required class="w-full pl-11 pr-4 py-4 bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-secondary/40 text-sm" placeholder="seu@email.com"/>
        </div>
      </div>

      <div class="space-y-2">
        <div class="flex justify-between">
          <label class="text-sm font-semibold text-on-surface-variant">Senha</label>
          <a href="/recuperar-senha" class="text-xs font-bold text-primary hover:underline">Esqueceu?</a>
        </div>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">lock</span>
          <input id="password" type="password" required class="w-full pl-11 pr-4 py-4 bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-secondary/40 text-sm" placeholder="••••••••"/>
        </div>
      </div>

      <div id="error-message" class="text-error text-sm text-center hidden"></div>

      <button type="submit" class="w-full bg-primary text-white font-headline font-bold py-4 rounded-full shadow-lg hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
        Entrar <span class="material-symbols-outlined">arrow_forward</span>
      </button>
    </form>

    <div class="mt-10 text-center">
      <p class="text-on-surface-variant text-sm">
        Não tem uma conta?
        <a href="/cadastro" class="text-primary font-bold hover:underline">Criar conta</a>
      </p>
    </div>
  </div>
  <div class="mt-8 text-center text-[10px] text-on-surface-variant/40">© 2025 I Love Delicitas • Boutique Editorial</div>
</main>

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('error-message');

    errorDiv.classList.add('hidden');

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      errorDiv.textContent = error.message === 'Invalid login credentials' ? 'Email ou senha inválidos' : error.message;
      errorDiv.classList.remove('hidden');
      return;
    }

    if (data.user) {
      // Verificar se é admin
      const { data: adminData } = await supabase
        .from('admins')
        .select('user_id')
        .eq('user_id', data.user.id)
        .single();

      if (adminData) {
        window.location.href = '/admin';
      } else {
        window.location.href = '/perfil';
      }
    }
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Acompanhar Pedido - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ae2f34",
          "primary-container": "#ff6b6b",
          "secondary": "#006a65",
          "surface": "#fff8f7",
          "on-surface": "#251818",
          "on-surface-variant": "#584140",
          "surface-container-low": "#fff0ef",
          "surface-container-lowest": "#ffffff",
          "outline-variant": "#e0bfbd"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"}
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .custom-glass { background: rgba(255, 248, 247, 0.7); backdrop-filter: blur(12px); }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body class="bg-surface font-body text-on-surface antialiased no-scrollbar">

<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl flex justify-between items-center px-6 py-4">
  <div class="flex items-center gap-4">
    <a href="/" class="text-on-surface hover:opacity-80">
      <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <h1 class="font-headline font-bold tracking-tight text-2xl italic text-[#FF6B6B]">I Love Delicitas</h1>
  </div>
  <div class="h-10 w-10 rounded-full overflow-hidden border-2 border-primary-container">
    <img alt="Perfil" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBrB1jnbA2gIJ-kdDN8sArPx8j7g1b5jDsarA7z0ZVBopGUkbbi2jGJoR9OeeBx90nWZkRrzLiqH-Ed_1hq9dNF00_NxF__obhY3VoL3lZsK6v0pLskdnNjbNP_DKUKCKadFdlOwbZQhsZ7IjvBv-L9psvN5sy0i3WvoEO-kDWVgRzsqkWQqiXj6oXYPjPCl5C8NxJ6FthWX0U2WvMSSX7bnB9aNyzI8c-F6z3ZFO6O9yRKJf-PSAbZV_58FtvC6QCTdrEDRPIdvZA_"/>
  </div>
</header>

<main class="pt-24 pb-32 px-4 max-w-md mx-auto">
  <div id="order-content">
    <div class="animate-pulse text-center py-20">Carregando pedido...</div>
  </div>
</main>

<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-[#fff0ef] backdrop-blur-lg rounded-t-3xl">
  <a href="/" class="flex flex-col items-center text-on-surface/60"><span class="material-symbols-outlined">home</span><span class="text-xs">Início</span></a>
  <a href="/catalogo" class="flex flex-col items-center text-on-surface/60"><span class="material-symbols-outlined">cake</span><span class="text-xs">Cardápio</span></a>
  <a href="/carrinho" class="flex flex-col items-center text-on-surface/60"><span class="material-symbols-outlined">shopping_cart</span><span class="text-xs">Carrinho</span></a>
  <a href="/perfil" class="flex flex-col items-center text-on-surface/60"><span class="material-symbols-outlined">person</span><span class="text-xs">Perfil</span></a>
</nav>

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const statusMap = {
    'received': { label: 'Recebido', step: 1, icon: 'receipt' },
    'preparing': { label: 'Preparando', step: 2, icon: 'bakery_dining' },
    'ready': { label: 'Pronto', step: 3, icon: 'check_circle' },
    'delivered': { label: 'Entregue', step: 5, icon: 'done_all' },
    'canceled': { label: 'Cancelado', step: 0, icon: 'cancel' }
  };

  async function loadOrder() {
    const path = window.location.pathname;
    const orderId = path.split('/').pop();
    
    if (!orderId || orderId === 'pedido') {
      document.getElementById('order-content').innerHTML = '<div class="text-center py-20"><span class="material-symbols-outlined text-6xl text-outline">error</span><p class="mt-4">Pedido não encontrado</p><a href="/" class="mt-6 inline-block bg-primary text-white px-6 py-3 rounded-full">Voltar ao início</a></div>';
      return;
    }

    const { data: order, error } = await supabase
      .from('orders')
      .select('*')
      .eq('id', orderId)
      .single();

    if (error || !order) {
      document.getElementById('order-content').innerHTML = '<div class="text-center py-20"><span class="material-symbols-outlined text-6xl text-outline">search_off</span><p class="mt-4">Pedido não encontrado</p><a href="/" class="mt-6 inline-block bg-primary text-white px-6 py-3 rounded-full">Voltar ao início</a></div>';
      return;
    }

    const { data: items } = await supabase
      .from('order_items')
      .select('*')
      .eq('order_id', order.id);

    const status = statusMap[order.status] || statusMap['received'];
    const step = status.step;
    const totalReais = (order.total_cents / 100).toFixed(2).replace('.', ',');

    const createdDate = new Date(order.created_at);
    const horaFormatada = createdDate.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

    document.getElementById('order-content').innerHTML = `
      <div class="bg-surface-container-lowest p-6 rounded-lg mb-6 shadow-sm">
        <div class="flex justify-between items-start mb-4">
          <div>
            <h2 class="font-headline font-bold text-lg">Pedido #${order.id.slice(0, 8)}</h2>
            <p class="text-on-surface-variant text-sm">${createdDate.toLocaleDateString('pt-BR')} às ${horaFormatada}</p>
          </div>
          <span class="bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full text-xs font-bold">${status.label}</span>
        </div>

        <div class="relative py-8">
          <div class="absolute top-1/2 left-0 w-full h-2 bg-surface-container rounded-full -translate-y-1/2"></div>
          <div class="absolute top-1/2 left-0 h-2 bg-secondary rounded-full -translate-y-1/2" style="width: ${(step / 5) * 100}%"></div>
          <div class="relative flex justify-between">
            ${['received', 'preparing', 'ready', 'delivered'].map((s, idx) => {
              const stepNum = statusMap[s].step;
              const isActive = step >= stepNum;
              const isCurrent = order.status === s;
              return `
                <div class="flex flex-col items-center gap-2">
                  <div class="w-8 h-8 rounded-full flex items-center justify-center ${isActive ? 'bg-secondary text-white' : 'bg-surface-container-highest text-on-surface-variant'} shadow-sm">
                    <span class="material-symbols-outlined text-sm">${statusMap[s].icon}</span>
                  </div>
                  <span class="text-[10px] font-bold ${isActive ? 'text-secondary' : 'text-on-surface/40'}">${statusMap[s].label}</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>

      <div class="bg-surface-container-low p-5 rounded-lg mb-6">
        <h3 class="font-bold text-sm mb-3">Itens do Pedido</h3>
        ${items ? items.map(item => `
          <div class="flex justify-between items-center py-2 border-b border-outline-variant/20 last:border-0">
            <div><span class="font-medium">${item.quantity}x</span> ${item.product_name}</div>
            <span class="font-bold">R$ ${(item.line_total_cents / 100).toFixed(2).replace('.', ',')}</span>
          </div>
        `).join('') : '<p class="text-sm text-on-surface-variant">Carregando itens...</p>'}
        <div class="flex justify-between mt-4 pt-3 border-t border-outline-variant/30 font-bold">
          <span>Total</span>
          <span>R$ ${totalReais}</span>
        </div>
      </div>

      <div class="bg-surface-container-low p-5 rounded-lg">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center">
            <span class="material-symbols-outlined text-primary">local_shipping</span>
          </div>
          <div>
            <p class="font-bold text-sm">Entrega</p>
            <p class="text-xs text-on-surface-variant">Prazo estimado: 30-45 min</p>
          </div>
        </div>
      </div>

      <div class="mt-6 text-center">
        <a href="/" class="text-primary font-bold text-sm underline underline-offset-4">Voltar ao início</a>
      </div>
    `;
  }

  loadOrder();
</script>
</body>
</html>

<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Criar conta - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ae2f34",
          "primary-container": "#ff6b6b",
          "secondary": "#006a65",
          "surface": "#fff8f7",
          "on-surface": "#251818",
          "on-surface-variant": "#584140",
          "surface-container-low": "#fff0ef",
          "surface-container-lowest": "#ffffff",
          "outline-variant": "#e0bfbd",
          "error": "#ba1a1a"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"}
      }
    }
  }
</script>
<style>
  .glass-morphism { background: rgba(255, 248, 247, 0.7); backdrop-filter: blur(12px); }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { min-height: 100dvh; }
</style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-primary-container/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-80 h-80 bg-secondary-container/30 rounded-full blur-3xl"></div>

<main class="w-full max-w-md z-10">
  <div class="surface-container-low rounded-xl p-8 shadow-2xl shadow-primary/5 border border-outline-variant/10">
    
    <div class="flex flex-col items-center mb-8 text-center">
      <img alt="I Love Delicitas Logo" class="h-24 w-24 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAyjXR8NvAteScuCy-L_s3zNnuQLZuYwczSkmYTwacD3ApSvZv1kpM5bYnvHheWsbNcrX1DKZQ6vYLTqmsdOtFXQYppTry71hj0futZ0vOfGB73GPIisvShPU4fkTzAcooCZt3UhtTgFR4Uts3GqrutL8ljwY1SmQCKvSntH9mIZJ4mIRtlGEnDaa0AIbErYQ4lI31gO2V6Xk_7lbnrbTjRRzpVxNYLcBZGLIbu6B-qxFKBZUWqV_zlsd4hFsTzqEgI8fKi7sgARIhc"/>
      <h1 class="font-headline text-3xl font-extrabold text-on-surface">Criar conta</h1>
      <p class="text-on-surface-variant mt-2">Junte-se à nossa comunidade doce</p>
    </div>

    <form id="register-form" class="space-y-5">
      <div class="space-y-2">
        <label class="block text-sm font-semibold ml-2">Nome</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">person</span>
          <input id="nome" type="text" required class="w-full pl-12 pr-4 py-4 bg-surface-container rounded-md border-none focus:ring-2 focus:ring-secondary/40" placeholder="Seu nome completo"/>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-semibold ml-2">Email</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
          <input id="email" type="email" required class="w-full pl-12 pr-4 py-4 bg-surface-container rounded-md border-none focus:ring-2 focus:ring-secondary/40" placeholder="seu@email.com"/>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-semibold ml-2">Senha</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
          <input id="senha" type="password" required class="w-full pl-12 pr-4 py-4 bg-surface-container rounded-md border-none focus:ring-2 focus:ring-secondary/40" placeholder="••••••••"/>
        </div>
      </div>

      <div class="flex items-start gap-3 px-2 py-1">
        <input id="terms" type="checkbox" required class="mt-1 w-5 h-5 rounded border-outline-variant text-primary"/>
        <label class="text-xs text-on-surface-variant">
          Ao clicar em Cadastrar, você concorda com nossos <a href="/termos" class="text-primary font-bold hover:underline">Termos de Uso</a> e <a href="/privacidade" class="text-primary font-bold hover:underline">Política de Privacidade</a>.
        </label>
      </div>

      <div id="error-message" class="text-error text-sm text-center hidden"></div>

      <button type="submit" class="w-full py-4 bg-primary text-white font-headline font-bold text-lg rounded-full shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
        Cadastrar <span class="material-symbols-outlined">arrow_forward</span>
      </button>
    </form>

    <div class="mt-8 text-center">
      <p class="text-on-surface-variant">Já tem uma conta? <a href="/login" class="text-primary font-extrabold hover:underline">Fazer login</a></p>
    </div>
  </div>

  <div class="mt-8 text-center">
    <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-on-surface-variant/30">Delicitas © 2025 — Artisanal Confectionery</p>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const nome = document.getElementById('nome').value;
    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;
    const terms = document.getElementById('terms').checked;
    const errorDiv = document.getElementById('error-message');

    errorDiv.classList.add('hidden');

    if (!terms) {
      errorDiv.textContent = 'Você precisa aceitar os termos de uso';
      errorDiv.classList.remove('hidden');
      return;
    }

    const { data, error } = await supabase.auth.signUp({
      email: email,
      password: senha,
      options: {
        data: { full_name: nome }
      }
    });

    if (error) {
      errorDiv.textContent = error.message;
      errorDiv.classList.remove('hidden');
      return;
    }

    if (data.user) {
      // Criar perfil na tabela profiles
      await supabase.from('profiles').insert({
        id: data.user.id,
        name: nome,
        email: email
      });

      alert('Conta criada com sucesso! Faça login para continuar.');
      window.location.href = '/login';
    }
  });
</script>
</body>
</html>

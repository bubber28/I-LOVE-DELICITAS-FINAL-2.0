<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ae2f34",
          "primary-container": "#ff6b6b",
          "secondary": "#006a65",
          "surface": "#fff8f7",
          "on-surface": "#251818",
          "on-surface-variant": "#584140",
          "surface-container-low": "#fff0ef",
          "surface-container-lowest": "#ffffff",
          "outline-variant": "#e0bfbd",
          "error": "#ba1a1a",
          "tertiary": "#6d5e00"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"}
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .glass-nav { background: rgba(255, 248, 247, 0.7); backdrop-filter: blur(12px); }
</style>
</head>
<body class="bg-surface text-on-surface font-body antialiased">

<header class="fixed top-0 w-full z-50 glass-nav shadow-sm">
  <div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
    <a class="flex items-center gap-2" href="/">
      <img alt="Logo" class="h-10 w-10 rounded-full" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBvzxhIy0WpC-PvSK-7z5lfd-0lYGzwmlOQaAw7gtfGbHVgsYSJKwwBlANeh1tSyCT0O9Eqp4llh4kG5qN9pZzz7zhSwf8g5VuGy7t9Eao5C4GCSPB3zZxk2fh6wAaAWfq9TPodgsw5aisSd--XaFB_Bn-WAm3rDo4B0ylsS1hEsbaPKMcT8Z6BClCdRY1wjlqhFH_aWpQd6oNNjyTud133ITHi5w6eWCicHAKDlAW3RhcOdJK1yardvMCfZ4NI_dbUhSSyDuPkgB6D"/>
      <span class="text-2xl font-black text-[#FF6B6B] font-headline tracking-tight">I Love Delicitas</span>
    </a>
  </div>
</header>

<main class="pt-24 pb-32 px-4 max-w-5xl mx-auto">
  <h1 class="font-headline text-4xl font-extrabold text-on-surface mb-8">Finalizar Pedido</h1>
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <!-- Left Column: Checkout Form -->
    <div class="lg:col-span-7 space-y-6">
      <!-- Delivery Section -->
      <section class="bg-surface-container-low p-8 rounded-lg">
        <div class="flex items-center gap-3 mb-6">
          <span class="material-symbols-outlined text-primary">local_shipping</span>
          <h2 class="font-headline text-xl font-bold">Endereço de Entrega</h2>
        </div>
        <form id="address-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="md:col-span-2">
            <label class="block text-sm font-semibold mb-2 ml-2">CEP</label>
            <input id="cep" class="w-full bg-surface-container rounded-md border-none focus:ring-2 focus:ring-secondary/40 px-4 py-3" placeholder="00000-000" type="text"/>
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-semibold mb-2 ml-2">Endereço</label>
            <input id="endereco" class="w-full bg-surface-container rounded-md border-none focus:ring-2 focus:ring-secondary/40 px-4 py-3" placeholder="Rua, número" type="text"/>
          </div>
          <div>
            <label class="block text-sm font-semibold mb-2 ml-2">Bairro</label>
            <input id="bairro" class="w-full bg-surface-container rounded-md border-none focus:ring-2 focus:ring-secondary/40 px-4 py-3" placeholder="Bairro" type="text"/>
          </div>
          <div>
            <label class="block text-sm font-semibold mb-2 ml-2">Complemento</label>
            <input id="complemento" class="w-full bg-surface-container rounded-md border-none focus:ring-2 focus:ring-secondary/40 px-4 py-3" placeholder="Apto, casa" type="text"/>
          </div>
        </form>
      </section>

      <!-- Payment Section -->
      <section class="bg-surface-container-low p-8 rounded-lg">
        <div class="flex items-center gap-3 mb-6">
          <span class="material-symbols-outlined text-primary">payments</span>
          <h2 class="font-headline text-xl font-bold">Método de Pagamento</h2>
        </div>
        <div class="grid grid-cols-1 gap-3" id="payment-methods">
          <label class="flex items-center p-4 bg-surface-container rounded-md cursor-pointer border-2 border-transparent hover:border-secondary/20">
            <input type="radio" name="payment" value="pix" class="w-5 h-5 text-secondary" checked/>
            <span class="ml-4 font-semibold flex items-center gap-2"><span class="material-symbols-outlined text-secondary">photos</span> Pix (5% desconto)</span>
          </label>
          <label class="flex items-center p-4 bg-surface-container rounded-md cursor-pointer border-2 border-transparent hover:border-secondary/20">
            <input type="radio" name="payment" value="credit_card" class="w-5 h-5 text-secondary"/>
            <span class="ml-4 font-semibold flex items-center gap-2"><span class="material-symbols-outlined text-secondary">credit_card</span> Cartão de Crédito</span>
          </label>
          <label class="flex items-center p-4 bg-surface-container rounded-md cursor-pointer border-2 border-transparent hover:border-secondary/20">
            <input type="radio" name="payment" value="cash" class="w-5 h-5 text-secondary"/>
            <span class="ml-4 font-semibold flex items-center gap-2"><span class="material-symbols-outlined text-secondary">payments</span> Dinheiro</span>
          </label>
        </div>
      </section>
    </div>

    <!-- Right Column: Order Summary -->
    <div class="lg:col-span-5">
      <div class="bg-surface-container p-8 rounded-lg sticky top-28 border-t-8 border-primary">
        <h2 class="font-headline text-2xl font-extrabold mb-6">Resumo do Pedido</h2>
        <div id="cart-items" class="space-y-4 mb-8">
          <div class="animate-pulse">Carregando itens...</div>
        </div>
        <div class="space-y-3 pt-6 border-t border-outline-variant/30" id="totals">
          <div class="flex justify-between"><span>Subtotal</span><span id="subtotal">R$ 0,00</span></div>
          <div class="flex justify-between"><span>Taxa de Entrega</span><span>R$ 7,00</span></div>
          <div class="flex justify-between text-secondary font-bold" id="discount-row"><span>Desconto</span><span id="discount">- R$ 0,00</span></div>
          <div class="flex justify-between text-xl font-black pt-4"><span>Total</span><span id="total">R$ 0,00</span></div>
        </div>
        <button id="finalizar-btn" class="w-full mt-8 bg-primary text-white py-4 rounded-full font-bold text-lg shadow-lg hover:scale-[1.02] active:scale-95 transition-all">Finalizar Pedido</button>
      </div>
    </div>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let cartItems = [];
  let subtotal = 0;
  let selectedPayment = 'pix';
  const deliveryFee = 700; // em centavos

  async function loadCart() {
    // Recupera carrinho do localStorage (vindo do catálogo/carrinho)
    const savedCart = localStorage.getItem('cart');
    if (savedCart) {
      cartItems = JSON.parse(savedCart);
    } else {
      // Mock para demonstração
      cartItems = [
        { id: 'prod-1', name: 'Fatia de Bolo Belga', price_cents: 1900, quantity: 2, image_url: 'https://lh3.googleusercontent.com/aida-public/AB6AXuCrvQhPpz53kArv_a-hUzxkAgqs9oc5Lub_pDiqwYsjrFc2C2TNa50-V587zOp6zlO-ynvLFOQOtvi7ajDV34eOC-BVWcDhWOi79g_h_nfQe6_skJjQ6sfepI4fjSxgikUqYN0HXvglgiaY8m48wtWN4zQMgvTy-eJFo6NdWtyzrsChRlH2PdaLawY9PkamC0gbOkj739V4wpaQdegm7RjqchruJG6w1DuZ-i8eqsJDqx3IWLvwg2f86y4hfpNPv3uchyxTfmnszqgB' },
        { id: 'prod-2', name: 'Caixa Macarons (6un)', price_cents: 4500, quantity: 1, image_url: 'https://lh3.googleusercontent.com/aida-public/AB6AXuC_EB3szyzzPHVLlMfyqzUG7OUVPasZvHDDpzkt_Q7HfeZJGiSJD7_BFwb2rYjt8wNpuYE5muqwEYFTheisAy-SDX2lucmPrRJ_xrkSQ9J7Nh94ZlK6ZV01h0-eNssJV7xM8fnlFSefVNhplBPC_ILyZnlp7LD57z--74hyLWgo5Qrlc7lPm1F7mJZYBUUf75kYEwh0OKe5MraRolEJsskDyxJ6ZvCLPZUvbHfmAye-cvHPulxhhr-MABFZ-hXeDjTOKdZyONEbZuQ9' }
      ];
    }
    renderCart();
  }

  function renderCart() {
    const container = document.getElementById('cart-items');
    subtotal = cartItems.reduce((sum, item) => sum + (item.price_cents * item.quantity), 0);
    
    container.innerHTML = cartItems.map(item => `
      <div class="flex justify-between items-start">
        <div class="flex gap-3">
          <img class="w-12 h-12 rounded-lg object-cover" src="${item.image_url}" alt="${item.name}"/>
          <div><p class="font-bold text-sm">${item.name}</p><p class="text-xs text-stone-500">Qtd: ${item.quantity}</p></div>
        </div>
        <span class="font-bold">R$ ${(item.price_cents * item.quantity / 100).toFixed(2).replace('.', ',')}</span>
      </div>
    `).join('');
    
    updateTotals();
  }

  function updateTotals() {
    const discountPercent = selectedPayment === 'pix' ? 0.05 : 0;
    const discountAmount = subtotal * discountPercent;
    const total = subtotal + deliveryFee - discountAmount;
    
    document.getElementById('subtotal').innerText = `R$ ${(subtotal / 100).toFixed(2).replace('.', ',')}`;
    document.getElementById('discount').innerText = `- R$ ${(discountAmount / 100).toFixed(2).replace('.', ',')}`;
    document.getElementById('total').innerText = `R$ ${(total / 100).toFixed(2).replace('.', ',')}`;
  }

  document.querySelectorAll('input[name="payment"]').forEach(radio => {
    radio.addEventListener('change', (e) => {
      selectedPayment = e.target.value;
      updateTotals();
    });
  });

  document.getElementById('finalizar-btn').addEventListener('click', async () => {
    const cep = document.getElementById('cep').value;
    const endereco = document.getElementById('endereco').value;
    const bairro = document.getElementById('bairro').value;
    
    if (!cep || !endereco || !bairro) {
      alert('Preencha o endereço completo');
      return;
    }

    const totalCents = (subtotal + deliveryFee - (selectedPayment === 'pix' ? subtotal * 0.05 : 0));
    
    const { data: order, error } = await supabase
      .from('orders')
      .insert({
        customer_name: 'Cliente',
        customer_phone: localStorage.getItem('userPhone') || '',
        status: 'received',
        total_cents: totalCents,
        items: cartItems
      })
      .select()
      .single();
    
    if (error) {
      alert('Erro ao finalizar pedido: ' + error.message);
      return;
    }
    
    // Salvar itens do pedido
    for (const item of cartItems) {
      await supabase.from('order_items').insert({
        order_id: order.id,
        product_id: item.id,
        product_name: item.name,
        unit_price_cents: item.price_cents,
        quantity: item.quantity,
        line_total_cents: item.price_cents * item.quantity
      });
    }
    
    localStorage.removeItem('cart');
    window.location.href = `/pedido/${order.id}`;
  });

  loadCart();
</script>
</body>
</html>

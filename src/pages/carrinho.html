<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Carrinho - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ae2f34",
          "primary-container": "#ff6b6b",
          "secondary": "#006a65",
          "surface": "#fff8f7",
          "on-surface": "#251818",
          "on-surface-variant": "#584140",
          "surface-container-low": "#fff0ef",
          "error": "#ba1a1a"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background-color: #fff8f7; }
  .cart-item-image {
    aspect-ratio: 1 / 1;
    object-fit: cover;
    width: 80px;
    height: 80px;
    border-radius: 0.75rem;
  }
</style>
</head>
<body>

<!-- Sidebar (menu hambúrguer) -->
<div id="mobile-overlay" class="fixed inset-0 bg-black/50 z-40 hidden"></div>
<div id="sidebar" class="fixed top-0 left-0 w-64 h-full bg-surface-container-low border-r border-outline-variant/30 transform -translate-x-full transition-transform duration-300 z-50 flex flex-col">
  <div class="px-6 py-8 flex justify-between items-center border-b border-outline-variant/30">
    <div class="flex items-center gap-3">
      <img class="h-10 w-auto" src="https://bizrnjpmsyxdsflgpxcl.supabase.co/storage/v1/object/public/logos/ILOVE%20DELICITAS%20PNG%20OK.png" alt="Logo">
      <span class="text-primary font-headline font-bold text-lg">Menu</span>
    </div>
    <button id="close-sidebar-btn" class="text-on-surface-variant hover:text-primary">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
  <nav class="flex-1 px-4 py-6 space-y-2">
    <a href="/" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">home</span><span>Início</span></a>
    <a href="/cardapio" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">menu_book</span><span>Cardápio</span></a>
    <a href="/carrinho" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">shopping_cart</span><span>Carrinho</span></a>
    <div id="auth-links-sidebar">
      <a href="/meus-pedidos" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors" id="sidebar-meus-pedidos"><span class="material-symbols-outlined">receipt</span><span>Meus Pedidos</span></a>
      <a href="/perfil" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors" id="sidebar-perfil"><span class="material-symbols-outlined">person</span><span>Perfil</span></a>
      <button id="sidebar-logout-btn" class="hidden w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-error-container/20 text-error transition-colors"><span class="material-symbols-outlined">logout</span><span>Sair</span></button>
      <a href="/login" id="sidebar-login-link" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">login</span><span>Entrar</span></a>
    </div>
  </nav>
</div>

<header class="fixed top-0 w-full z-50 bg-[#fff8f7]/70 backdrop-blur-xl shadow-sm">
  <div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
    <div class="flex items-center gap-2">
      <button id="open-sidebar-btn" class="lg:hidden p-2 rounded-full hover:bg-surface-container-low transition-colors">
        <span class="material-symbols-outlined text-primary">menu</span>
      </button>
      <a href="/"><img class="h-12" src="https://bizrnjpmsyxdsflgpxcl.supabase.co/storage/v1/object/public/logos/ILOVE%20DELICITAS%20PNG%20OK.png"/></a>
    </div>
    <div class="flex items-center gap-4">
      <a href="/carrinho" class="relative p-2"><span class="material-symbols-outlined text-primary">shopping_bag</span><span id="cart-count" class="absolute -top-1 -right-1 bg-primary text-white text-xs w-5 h-5 rounded-full">0</span></a>
      <div id="user-menu" class="hidden flex items-center gap-3">
        <a href="/meus-pedidos" class="text-primary hover:underline text-sm">Meus pedidos</a>
        <a href="/perfil" class="text-primary hover:underline text-sm">Perfil</a>
        <span id="user-name" class="text-primary font-semibold"></span>
        <button id="logout-btn" class="text-sm bg-surface-container-low px-3 py-1 rounded-full hover:bg-surface-container transition">Sair</button>
      </div>
      <a href="/login" id="login-link" class="text-primary font-semibold hover:underline">Entrar</a>
    </div>
  </div>
</header>

<main class="pt-24 pb-32 px-4 max-w-5xl mx-auto">
  <h1 class="text-3xl font-bold mb-6">Seu Carrinho</h1>
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <div id="cart-items" class="lg:col-span-2 space-y-4">
      <div class="text-center py-8">Carregando carrinho...</div>
    </div>
    <div class="space-y-6">
      <div class="bg-white rounded-2xl p-6 shadow-sm">
        <h2 class="text-xl font-bold mb-4">Resumo</h2>
        <div class="space-y-2">
          <div class="flex justify-between"><span>Subtotal</span><span id="subtotal">R$ 0,00</span></div>
          <div class="flex justify-between"><span>Entrega</span><span id="frete">R$ 7,00</span></div>
          <div class="flex justify-between text-secondary"><span>Desconto</span><span id="desconto">- R$ 0,00</span></div>
          <div class="border-t pt-2 flex justify-between font-bold text-lg"><span>Total</span><span id="total">R$ 0,00</span></div>
        </div>
        <button id="checkout-btn" class="w-full mt-6 bg-primary text-white py-3 rounded-full font-bold">Finalizar Pedido</button>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-sm">
        <label class="font-bold mb-2 block">Cupom de desconto</label>
        <div class="flex gap-2">
          <input id="coupon-input" type="text" class="flex-grow border rounded-full px-4 py-2" placeholder="CUPOM10">
          <button id="apply-coupon" class="bg-secondary text-white px-4 py-2 rounded-full">Aplicar</button>
        </div>
        <p id="coupon-message" class="text-xs mt-2 hidden"></p>
      </div>
    </div>
  </div>

  <!-- Seção de cross‑sell -->
  <div id="cross-sell-section" class="mt-12 hidden">
    <h2 class="text-2xl font-bold mb-6">✨ Aproveite também</h2>
    <div id="cross-sell-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- produtos sugeridos serão inseridos aqui -->
    </div>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let cart = [];
  let appliedCoupon = null;
  const frete = 7.00;

  function loadCart() {
    const stored = localStorage.getItem('cart');
    cart = stored ? JSON.parse(stored) : [];
    const storedCoupon = localStorage.getItem('appliedCoupon');
    appliedCoupon = storedCoupon ? JSON.parse(storedCoupon) : null;
    updateCartCount();
    renderCart();
    updateTotals();
    loadCrossSell(); // carrega sugestões de produtos
  }

  function updateCartCount() {
    const totalItems = cart.reduce((sum, i) => sum + (i.quantity || 1), 0);
    document.getElementById('cart-count').innerText = totalItems;
  }

  function saveCart() {
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    renderCart();
    updateTotals();
    loadCrossSell(); // recarrega sugestões após alteração
  }

  function renderCart() {
    const container = document.getElementById('cart-items');
    if (!cart.length) {
      container.innerHTML = `<div class="text-center py-8">Seu carrinho está vazio. <a href="/cardapio" class="text-primary underline">Ver cardápio</a></div>`;
      document.getElementById('checkout-btn').disabled = true;
      return;
    }
    document.getElementById('checkout-btn').disabled = false;
    container.innerHTML = cart.map((item, idx) => `
      <div class="bg-white rounded-lg p-4 flex gap-4 items-center shadow-sm">
        <img class="cart-item-image" src="${item.image_url || 'https://placehold.co/300x300?text=Delícia'}" alt="${escapeHtml(item.name)}">
        <div class="flex-grow">
          <h3 class="font-bold text-lg">${escapeHtml(item.name)}</h3>
          <div class="flex justify-between items-center mt-2">
            <span class="text-primary font-bold">R$ ${((item.price_cents / 100) * (item.quantity || 1)).toFixed(2).replace('.', ',')}</span>
            <div class="flex items-center gap-2">
              <button class="qty-btn w-8 h-8 rounded-full bg-surface-container-low flex items-center justify-center" data-idx="${idx}" data-delta="-1">-</button>
              <span class="w-8 text-center font-semibold">${item.quantity || 1}</span>
              <button class="qty-btn w-8 h-8 rounded-full bg-surface-container-low flex items-center justify-center" data-idx="${idx}" data-delta="1">+</button>
              <button class="remove-btn text-error" data-idx="${idx}">🗑️</button>
            </div>
          </div>
        </div>
      </div>
    `).join('');
    document.querySelectorAll('.qty-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        const delta = parseInt(btn.dataset.delta);
        const newQty = (cart[idx].quantity || 1) + delta;
        if (newQty <= 0) cart.splice(idx, 1);
        else cart[idx].quantity = newQty;
        saveCart();
      });
    });
    document.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        cart.splice(idx, 1);
        saveCart();
      });
    });
  }

  function updateTotals() {
    let subtotal = 0;
    cart.forEach(i => subtotal += (i.price_cents / 100) * (i.quantity || 1));
    let desconto = 0;
    if (appliedCoupon) desconto = (subtotal * appliedCoupon.desconto) / 100;
    const total = subtotal + frete - desconto;
    document.getElementById('subtotal').innerText = `R$ ${subtotal.toFixed(2).replace('.', ',')}`;
    document.getElementById('frete').innerText = `R$ ${frete.toFixed(2).replace('.', ',')}`;
    document.getElementById('desconto').innerText = `- R$ ${desconto.toFixed(2).replace('.', ',')}`;
    document.getElementById('total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
  }

  async function applyCoupon() {
    const code = document.getElementById('coupon-input').value.trim().toUpperCase();
    const msg = document.getElementById('coupon-message');
    if (!code) return;

    const hoje = new Date().toISOString().split('T')[0];
    const { data, error } = await supabaseClient
      .from('cupons')
      .select('*')
      .eq('codigo', code)
      .eq('ativo', true)
      .gte('validade', hoje)
      .maybeSingle();

    if (error || !data) {
      msg.textContent = 'Cupom inválido ou expirado.';
      msg.classList.remove('hidden', 'text-secondary');
      msg.classList.add('text-error');
      appliedCoupon = null;
      localStorage.removeItem('appliedCoupon');
      updateTotals();
      return;
    }

    if (data.usos_atual >= data.uso_maximo) {
      msg.textContent = 'Este cupom já atingiu o limite de uso.';
      msg.classList.remove('hidden', 'text-secondary');
      msg.classList.add('text-error');
      appliedCoupon = null;
      localStorage.removeItem('appliedCoupon');
      updateTotals();
      return;
    }

    appliedCoupon = data;
    localStorage.setItem('appliedCoupon', JSON.stringify(data));
    msg.textContent = `Cupom aplicado! ${data.desconto}% de desconto.`;
    msg.classList.remove('hidden', 'text-error');
    msg.classList.add('text-secondary');
    updateTotals();
  }

  // ================== CROSS‑SELL ==================
  async function loadCrossSell() {
    if (cart.length === 0) return;

    // Extrair IDs e categorias dos produtos no carrinho
    const productIds = cart.map(i => i.id);
    const { data: productsInCart } = await supabaseClient
      .from('products')
      .select('id, category_id')
      .in('id', productIds);

    const categoryIds = [...new Set(productsInCart.map(p => p.category_id).filter(id => id))];
    if (categoryIds.length === 0) return;

    // Buscar produtos da mesma categoria, excluindo os que já estão no carrinho
    const { data: suggestions } = await supabaseClient
      .from('products')
      .select('*')
      .in('category_id', categoryIds)
      .not('id', 'in', `(${productIds.map(id => `'${id}'`).join(',')})`)
      .eq('active', true)
      .gt('stock', 0)
      .limit(3);

    if (!suggestions || suggestions.length === 0) return;

    const container = document.getElementById('cross-sell-container');
    const section = document.getElementById('cross-sell-section');
    container.innerHTML = suggestions.map(prod => `
      <div class="bg-white rounded-2xl p-5 shadow-sm product-card transition-all">
        <div class="mb-4 overflow-hidden rounded-xl">
          <img class="product-image" src="${prod.image_url || 'https://placehold.co/300x300?text=Delícia'}" alt="${escapeHtml(prod.name)}">
        </div>
        <h3 class="font-headline font-bold text-xl mb-1">${escapeHtml(prod.name)}</h3>
        <p class="text-sm text-on-surface-variant mb-3 line-clamp-2">${escapeHtml(prod.description || 'Delícia artesanal')}</p>
        <div class="flex justify-between items-center">
          <span class="text-2xl font-black text-on-surface">R$ ${(prod.price_cents / 100).toFixed(2).replace('.', ',')}</span>
          <button onclick="addToCartCrossSell('${prod.id}', '${escapeHtml(prod.name)}', ${prod.price_cents}, '${prod.image_url || ''}')" class="bg-secondary text-white p-3 rounded-full hover:scale-110 transition">
            <span class="material-symbols-outlined">add_shopping_cart</span>
          </button>
        </div>
      </div>
    `).join('');
    section.classList.remove('hidden');
  }

  function addToCartCrossSell(id, name, priceCents, imageUrl) {
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const existing = cart.find(i => i.id === id);
    if (existing) existing.quantity = (existing.quantity || 1) + 1;
    else cart.push({ id, name, price_cents: priceCents, quantity: 1, image_url: imageUrl });
    localStorage.setItem('cart', JSON.stringify(cart));
    loadCart(); // recarrega todo o carrinho e cross‑sell
    alert('Produto adicionado ao carrinho!');
  }

  document.getElementById('checkout-btn').addEventListener('click', () => {
    if (cart.length === 0) alert('Carrinho vazio.');
    else window.location.href = '/checkout';
  });
  document.getElementById('apply-coupon').addEventListener('click', applyCoupon);

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  }

  // ================== HEADER AUTH ==================
  async function updateHeaderAuth() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    const userMenu = document.getElementById('user-menu');
    const loginLink = document.getElementById('login-link');
    if (session) {
      userMenu.classList.remove('hidden');
      loginLink.classList.add('hidden');
      const { data: profile } = await supabaseClient.from('profiles').select('name').eq('id', session.user.id).single();
      const userName = profile?.name || session.user.email.split('@')[0];
      document.getElementById('user-name').innerText = userName;
    } else {
      userMenu.classList.add('hidden');
      loginLink.classList.remove('hidden');
    }
  }
  document.getElementById('logout-btn')?.addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    localStorage.removeItem('cart');
    window.location.href = '/';
  });

  // ================== SIDEBAR ==================
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('mobile-overlay');
  const openBtn = document.getElementById('open-sidebar-btn');
  const closeBtn = document.getElementById('close-sidebar-btn');
  function closeSidebar() { sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden'); }
  function openSidebar() { sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden'); }
  if (openBtn) openBtn.addEventListener('click', openSidebar);
  if (closeBtn) closeBtn.addEventListener('click', closeSidebar);
  if (overlay) overlay.addEventListener('click', closeSidebar);
  document.querySelectorAll('#sidebar a, #sidebar button').forEach(link => link.addEventListener('click', () => { if (window.innerWidth < 1024) closeSidebar(); }));

  async function updateSidebarAuth() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    const loginLink = document.getElementById('sidebar-login-link');
    const meusPedidos = document.getElementById('sidebar-meus-pedidos');
    const perfil = document.getElementById('sidebar-perfil');
    const logoutBtn = document.getElementById('sidebar-logout-btn');
    if (session) {
      loginLink.classList.add('hidden');
      meusPedidos.classList.remove('hidden');
      perfil.classList.remove('hidden');
      logoutBtn.classList.remove('hidden');
    } else {
      loginLink.classList.remove('hidden');
      meusPedidos.classList.add('hidden');
      perfil.classList.add('hidden');
      logoutBtn.classList.add('hidden');
    }
  }
  document.getElementById('sidebar-logout-btn')?.addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    localStorage.removeItem('cart');
    window.location.href = '/';
  });

  updateHeaderAuth();
  updateSidebarAuth();
  loadCart();
</script>
</body>
</html>

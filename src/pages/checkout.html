<style>
  /* (mantenha todos os estilos originais – são os mesmos) */
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  .input-field:focus { outline: none; border-color: #ae2f34; box-shadow: 0 0 0 2px rgba(174,47,52,0.2); }

    width: 0%;
    height: 100%;
    transition: width 0.3s ease;
  }
  @media (max-width: 640px) {
    .address-row { flex-direction: column; gap: 0.75rem; }
    .address-row > div { width: 100%; }
  }
  .store-address {
    background-color: #f0fdf4;
    border-left: 4px solid #22c55e;
    padding: 1rem;
    border-radius: 1rem;
    margin-bottom: 1rem;

  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

</head>
<body>

<!-- SIDEBAR E HEADER (MANTIDOS IGUAIS) -->
<!-- ... todo o HTML da sidebar, header, main ... é extenso, mas você já tem. Vou manter exatamente igual ao seu, apenas alterando o script. -->
<!-- Para evitar repetir 300 linhas, vou resumir: mantenha o HTML exatamente como está. Apenas o <script> será substituído. -->

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const STORE_LAT = -19.94928035532827;
  const STORE_LNG = -43.98666216297332;

  let cart = [];
  let appliedCoupon = null;
  let userId = null;
  let guestId = null;
  let currentFrete = 0;
  let config = {
    frete_gratis_minimo: 0,
    frete_padrao: 7.00,
    frete_gratis_distancia_maxima: 5,
    store_lat: STORE_LAT,
    store_lng: STORE_LNG
  };
  let cepValido = false;
  let currentDistance = null;
  let isSubmitting = false; // 🔒 anti-duplo clique

  // ================== PERSISTÊNCIA (apenas nome e telefone) ==================
  function getStorageKey() {
    if (userId) return `checkout_form_data_${userId}`;
    if (guestId) return `checkout_form_data_guest`;
    return 'checkout_form_data_guest';
  }

  function saveFormData() {
    const key = getStorageKey();
    // 🔒 NÃO salva CPF, endereço, CEP, etc. – apenas nome e telefone
    const formFields = ['customer-name', 'customer-phone', 'delivery-type', 'payment-method'];
    const data = {};
    formFields.forEach(field => {
      const el = document.getElementById(field);
      if (el) data[field] = el.value;
    });
    localStorage.setItem(key, JSON.stringify(data));
  }

  function restoreFormData() {
    const key = getStorageKey();
    const saved = localStorage.getItem(key);
    if (!saved) return;
    try {
      const data = JSON.parse(saved);
      for (const [field, value] of Object.entries(data)) {
        const el = document.getElementById(field);
        if (el && value) el.value = value;
      }
    } catch(e) { console.warn(e); }
  }

  function attachAutoSave() {
    const fields = ['customer-name', 'customer-phone', 'delivery-type', 'payment-method'];
    fields.forEach(field => {
      const el = document.getElementById(field);
      if (el) {
        el.addEventListener('input', saveFormData);
        el.addEventListener('change', saveFormData);
      }
    });
    window.addEventListener('beforeunload', saveFormData);
    // Salva ao clicar em links (incluindo frete grátis)
    document.body.addEventListener('click', (e) => {
      const link = e.target.closest('a');
      if (link && link.href) saveFormData();
    });
  }

  function clearFormData() {
    localStorage.removeItem(getStorageKey());
  }

  // ================== UTILITÁRIOS ==================
  function formatCPF(value) {
    value = value.replace(/\D/g, '');
    if (value.length > 11) value = value.slice(0, 11);
    if (value.length > 9) {
      value = value.replace(/^(\d{3})(\d{3})(\d{3})(\d{2})$/, '$1.$2.$3-$4');
    } else if (value.length > 6) {
      value = value.replace(/^(\d{3})(\d{3})(\d{0,3})$/, '$1.$2.$3');
    } else if (value.length > 3) {
      value = value.replace(/^(\d{3})(\d{0,3})$/, '$1.$2');
    }
    return value;
  }

  // ================== CONFIGURAÇÕES ==================
  async function loadConfig() {
    const { data, error } = await supabaseClient
      .from('app_config')
      .select('frete_gratis_minimo, frete_padrao, frete_gratis_distancia_maxima')
      .single();
    if (!error && data) {
      config.frete_gratis_minimo = parseFloat(data.frete_gratis_minimo) || 0;
      config.frete_padrao = parseFloat(data.frete_padrao) || 7.00;
      config.frete_gratis_distancia_maxima = parseInt(data.frete_gratis_distancia_maxima) || 5;
      console.log('Config carregada');
    }
  }

  // ================== GEOLOCALIZAÇÃO ==================
  async function geocodeAddress(address) {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`;
    try {
      const response = await fetch(url, { headers: { 'User-Agent': 'MeuDeliveryApp/1.0' } });
      const data = await response.json();
      if (data && data.length > 0) {
        return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
      }
      return null;
    } catch (err) {
      console.error('Erro na geocodificação');
      return null;
    }
  }

  function haversineDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  async function buscarEnderecoPorCep(cep) {
    const cepLimpo = cep.replace(/\D/g, '');
    if (cepLimpo.length !== 8) return null;
    try {
      const response = await fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`);
      const data = await response.json();
      if (data.erro) throw new Error('CEP não encontrado');
      return data;
    } catch (err) {
      alert('CEP inválido ou não encontrado');
      return null;
    }
  }

  // ================== CÁLCULO DO FRETE ==================
  async function calcularFrete(cep, addressString, subtotal) {
    if (!cep || cep.replace(/\D/g, '').length !== 8) return config.frete_padrao;

    const cepLimpo = cep.replace(/\D/g, '');
    const { data: regiao, error } = await supabaseClient
      .from('frete_regioes')
      .select('valor')
      .lte('cep_inicio', cepLimpo)
      .gte('cep_fim', cepLimpo)
      .maybeSingle();

    let frete = regiao ? parseFloat(regiao.valor) : config.frete_padrao;
    if (error) frete = config.frete_padrao;

    let distancia = null;
    if (addressString) {
      const coords = await geocodeAddress(addressString);
      if (coords) {
        distancia = haversineDistance(STORE_LAT, STORE_LNG, coords.lat, coords.lng);
        currentDistance = distancia;
        console.log(`Distância: ${distancia.toFixed(2)} km`);
      }
    }

    const freeShipping = (currentDistance !== null && currentDistance <= config.frete_gratis_distancia_maxima && subtotal >= config.frete_gratis_minimo);
    return freeShipping ? 0 : frete;
  }

  async function atualizarFrete() {
    const deliveryType = document.getElementById('delivery-type').value;
    if (deliveryType === 'pickup') {
      currentFrete = 0;
      document.getElementById('frete').innerText = 'R$ 0,00';
      atualizarTotal(); atualizarAvisoFreteGratis(); cepValido = true;
      return;
    }
    const cep = document.getElementById('cep').value;
    if (!cep || cep.replace(/\D/g, '').length !== 8) {
      document.getElementById('frete').innerText = '--';
      currentFrete = 0; atualizarTotal(); atualizarAvisoFreteGratis(); cepValido = false;
      return;
    }
    const rua = document.getElementById('rua').value;
    const numero = document.getElementById('numero').value;
    const bairro = document.getElementById('bairro').value;
    const cidade = document.getElementById('cidade').value;
    const uf = document.getElementById('uf').value;
    let addressString = '';
    if (rua && numero && bairro && cidade && uf) {
      addressString = `${rua}, ${numero} - ${bairro}, ${cidade} - ${uf}`;
    }
    const subtotal = parseFloat(document.getElementById('subtotal').innerText.replace('R$ ', '').replace(',', '.'));
    let frete = await calcularFrete(cep, addressString, subtotal);
    currentFrete = frete;
    document.getElementById('frete').innerText = `R$ ${frete.toFixed(2).replace('.', ',')}`;
    cepValido = true;
    atualizarTotal(); atualizarAvisoFreteGratis();
  }

  function atualizarTotal() {
    const subtotal = parseFloat(document.getElementById('subtotal').innerText.replace('R$ ', '').replace(',', '.'));
    const desconto = parseFloat(document.getElementById('desconto').innerText.replace('- R$ ', '').replace(',', '.') || 0);
    const total = subtotal + currentFrete - desconto;
    document.getElementById('total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
  }

  function atualizarAvisoFreteGratis() {
    const subtotal = parseFloat(document.getElementById('subtotal').innerText.replace('R$ ', '').replace(',', '.'));
    const min = config.frete_gratis_minimo;
    const deliveryType = document.getElementById('delivery-type').value;
    const avisoDiv = document.getElementById('frete-gratis-aviso');
    const barDiv = document.getElementById('frete-gratis-bar');

    if (deliveryType === 'pickup' || min <= 0 || cart.length === 0 || subtotal >= min) {
      avisoDiv.classList.add('hidden'); barDiv.classList.add('hidden');
      return;
    }
    const falta = (min - subtotal).toFixed(2);
    const percentual = (subtotal / min) * 100;
    const mensagem = `💸 Faltam <strong>R$ ${falta.replace('.', ',')}</strong> para ganhar <strong>frete grátis</strong>! <a href="/cardapio" class="underline font-bold ml-2" id="add-more-items-link">Que tal adicionar mais itens?</a>`;
    document.getElementById('frete-gratis-mensagem').innerHTML = mensagem;
    document.getElementById('frete-gratis-fill').style.width = `${percentual}%`;
    avisoDiv.classList.remove('hidden'); barDiv.classList.remove('hidden');

    const link = document.getElementById('add-more-items-link');
    if (link) {
      link.removeEventListener('click', saveFormData);
      link.addEventListener('click', saveFormData);
    }
  }

  function toggleAddressBlocks() {
    const deliveryType = document.getElementById('delivery-type').value;
    const addressBlock = document.getElementById('address-block');
    const pickupBlock = document.getElementById('pickup-block');
    if (deliveryType === 'pickup') {
      addressBlock.classList.add('hidden-block');
      pickupBlock.classList.remove('hidden-block');
      document.querySelectorAll('#address-block input, #address-block select').forEach(f => f.removeAttribute('required'));
    } else {
      addressBlock.classList.remove('hidden-block');
      pickupBlock.classList.add('hidden-block');
      ['cep','rua','numero','bairro','cidade','uf'].forEach(id => {
        const field = document.getElementById(id);
        if (field) field.setAttribute('required', 'required');
      });
    }
    atualizarFrete();
  }

  // ================== LOAD DATA ==================
  async function loadData() {
    await loadConfig();

    const storedCart = localStorage.getItem('cart');
    cart = storedCart ? JSON.parse(storedCart) : [];
    if (cart.length === 0) {
      window.location.href = '/carrinho';
      return;
    }

    const storedCoupon = localStorage.getItem('appliedCoupon');
    appliedCoupon = storedCoupon ? JSON.parse(storedCoupon) : null;
    updateCartCount();
    renderSummary();

    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      userId = session.user.id;
      guestId = null;
      const { data: profile } = await supabaseClient
        .from('profiles')
        .select('name, phone, address, cpf')
        .eq('id', userId)
        .single();
      if (profile) {
        const key = getStorageKey();
        if (!localStorage.getItem(key)) {
          if (profile.name) document.getElementById('customer-name').value = profile.name;
          if (profile.phone) document.getElementById('customer-phone').value = profile.phone;
          if (profile.cpf) document.getElementById('cpf').value = formatCPF(profile.cpf);
        }
      }
    } else {
      userId = null;
      guestId = localStorage.getItem('guest_id');
      if (!guestId) {
        guestId = 'guest_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem('guest_id', guestId);
      }
    }

    restoreFormData();
    attachAutoSave();

    const cpfInput = document.getElementById('cpf');
    if (cpfInput) {
      cpfInput.addEventListener('input', function(e) {
        this.value = formatCPF(this.value);
        saveFormData();
      });
    }

    toggleAddressBlocks();
    document.getElementById('delivery-type').addEventListener('change', () => {
      toggleAddressBlocks();
      saveFormData();
    });

    document.getElementById('frete').innerText = '--';
    currentFrete = 0;
    atualizarTotal();
  }

  function updateCartCount() {
    const totalItems = cart.reduce((sum, i) => sum + (i.quantity || 1), 0);
    document.getElementById('cart-count').innerText = totalItems;
  }

  function renderSummary() {
    const container = document.getElementById('cart-items-summary');
    if (!cart.length) {
      container.innerHTML = '<div class="text-center py-4">Carrinho vazio. <a href="/cardapio" class="text-primary underline">Escolha produtos</a></div>';
      document.getElementById('submit-order').disabled = true;
      return;
    }
    let subtotal = 0;
    const itemsHtml = cart.map(item => {
      const itemTotal = (item.price_cents / 100) * (item.quantity || 1);
      subtotal += itemTotal;
      return `<div class="flex justify-between text-sm"><span>${item.quantity}x ${escapeHtml(item.name)}</span><span>R$ ${itemTotal.toFixed(2).replace('.', ',')}</span></div>`;
    }).join('');
    container.innerHTML = itemsHtml;
    let desconto = appliedCoupon ? (subtotal * appliedCoupon.desconto) / 100 : 0;
    document.getElementById('subtotal').innerText = `R$ ${subtotal.toFixed(2).replace('.', ',')}`;
    document.getElementById('desconto').innerText = `- R$ ${desconto.toFixed(2).replace('.', ',')}`;
  }

  // ================== SUBMIT PEDIDO (USANDO RPC SEGURA) ==================
  async function submitOrder() {
    if (isSubmitting) {
      console.warn('Pedido já em andamento');
      return;
    }
    isSubmitting = true;
    const btn = document.getElementById('submit-order');
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Processando...';

    try {
      const name = document.getElementById('customer-name').value.trim();
      const phone = document.getElementById('customer-phone').value.trim();
      const cpfRaw = document.getElementById('cpf').value.replace(/\D/g, '');
      const deliveryType = document.getElementById('delivery-type').value;
      const payment = document.getElementById('payment-method').value;
      const couponCode = document.getElementById('coupon-input')?.value.trim().toUpperCase() || null;

      if (!name || !phone) throw new Error('Preencha nome e telefone.');
      if (cpfRaw && cpfRaw.length !== 11) throw new Error('CPF inválido.');
      if (cart.length === 0) throw new Error('Carrinho vazio.');

      let deliveryAddress = null;
      if (deliveryType === 'delivery') {
        const rua = document.getElementById('rua').value.trim();
        const numero = document.getElementById('numero').value.trim();
        const bairro = document.getElementById('bairro').value.trim();
        const cidade = document.getElementById('cidade').value.trim();
        const uf = document.getElementById('uf').value.trim();
        const complemento = document.getElementById('complemento').value.trim();
        const referencia = document.getElementById('referencia').value.trim();
        if (!rua || !numero || !bairro || !cidade || !uf) throw new Error('Preencha todos os campos do endereço.');
        deliveryAddress = `${rua}, ${numero}${complemento ? `, ${complemento}` : ''} - ${bairro}, ${cidade} - ${uf}`;
        if (referencia) deliveryAddress += ` (ref: ${referencia})`;
      }

      // Prepara itens para a RPC (sem preços adulteráveis – mas a RPC vai validar)
      const itemsForRpc = cart.map(item => ({
        product_id: item.id || null,
        name: item.name,
        quantity: item.quantity || 1,
        price_cents: item.price_cents
      }));

      // 🔥 CHAMADA SEGURA À RPC
      const { data, error } = await supabaseClient.rpc('create_order_secure', {
        p_customer_name: name,
        p_customer_phone: phone,
        p_delivery_type: deliveryType,
        p_payment_method: payment,
        p_items: itemsForRpc,
        p_cpf: cpfRaw || null,
        p_delivery_address: deliveryAddress,
        p_coupon_code: couponCode,
        p_guest_id: guestId,
        p_user_id: userId,
        p_distance_km: currentDistance
      });

      if (error) throw error;

      const orderId = data.order_id;
      console.log('Pedido criado com segurança, ID:', orderId);

      // Broadcast (opcional)
      try {
        await supabaseClient.channel('admin-notifications').send({
          type: 'broadcast',
          event: 'new-order',
          payload: { orderId, customer: name, status: 'received', created_at: new Date().toISOString() }
        });
      } catch(e) { console.warn('Broadcast falhou', e); }

      // Limpeza
      clearFormData();
      localStorage.removeItem('cart');
      localStorage.removeItem('appliedCoupon');

      // Redireciona
      window.location.href = `/pedido-confirmado?id=${orderId}`;

    } catch (err) {
      console.error('Erro:', err.message);
      const errorEl = document.getElementById('error-message');
      errorEl.textContent = err.message || 'Erro ao criar pedido. Tente novamente.';
      errorEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = originalText;
    } finally {
      isSubmitting = false;
    }
  }

  // ================== EVENT LISTENERS ==================
  document.getElementById('submit-order').addEventListener('click', submitOrder);

  document.getElementById('buscar-cep').addEventListener('click', async () => {
    let cep = document.getElementById('cep').value.replace(/\D/g, '');
    if (cep.length !== 8) { alert('Digite um CEP válido com 8 dígitos'); return; }
    const endereco = await buscarEnderecoPorCep(cep);
    if (endereco) {
      document.getElementById('rua').value = endereco.logradouro || '';
      document.getElementById('bairro').value = endereco.bairro || '';
      document.getElementById('cidade').value = endereco.localidade || '';
      document.getElementById('uf').value = endereco.uf || '';
      document.getElementById('numero').focus();
      saveFormData();
      await atualizarFrete();
    }
  });

  document.getElementById('cep').addEventListener('blur', async () => {
    let cep = document.getElementById('cep').value.replace(/\D/g, '');
    if (cep.length === 8) await atualizarFrete();
    else {
      document.getElementById('frete').innerText = '--';
      currentFrete = 0; atualizarTotal(); atualizarAvisoFreteGratis(); cepValido = false;
    }
    saveFormData();
  });

  const addressFields = ['rua', 'numero', 'bairro', 'cidade', 'uf'];
  addressFields.forEach(field => {
    document.getElementById(field).addEventListener('change', () => {
      const cep = document.getElementById('cep').value;
      if (cep && cep.replace(/\D/g, '').length === 8) atualizarFrete();
      saveFormData();
    });
  });

  // ================== AUTH E SIDEBAR (MANTIDOS IGUAIS) ==================
  async function updateHeaderAuth() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    const userMenu = document.getElementById('user-menu');
    const loginLink = document.getElementById('login-link');
    if (session) {
      userMenu.classList.remove('hidden');
      loginLink.classList.add('hidden');
      const { data: profile } = await supabaseClient.from('profiles').select('name').eq('id', session.user.id).single();
      document.getElementById('user-name').innerText = profile?.name || session.user.email.split('@')[0];
    } else {
      userMenu.classList.add('hidden');
      loginLink.classList.remove('hidden');
    }
  }
  document.getElementById('logout-btn')?.addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    clearFormData();
    localStorage.removeItem('cart');
    window.location.href = '/';
  });

  const sidebar = document.getElementById('sidebar'), overlay = document.getElementById('mobile-overlay'), openBtn = document.getElementById('open-sidebar-btn'), closeBtn = document.getElementById('close-sidebar-btn');
  function closeSidebar() { sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden'); }
  function openSidebar() { sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden'); }
  openBtn?.addEventListener('click', openSidebar); closeBtn?.addEventListener('click', closeSidebar); overlay?.addEventListener('click', closeSidebar);
  document.querySelectorAll('#sidebar a, #sidebar button').forEach(link => link.addEventListener('click', () => { if (window.innerWidth < 1024) closeSidebar(); }));

  async function updateSidebarAuth() {
    const loginLink = document.getElementById('sidebar-login-link');
    const meusPedidos = document.getElementById('sidebar-meus-pedidos');
    const perfil = document.getElementById('sidebar-perfil');
    const logoutBtn = document.getElementById('sidebar-logout-btn');
    if (loginLink && meusPedidos && perfil && logoutBtn) {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        loginLink.classList.add('hidden');
        meusPedidos.classList.remove('hidden');
        perfil.classList.remove('hidden');
        logoutBtn.classList.remove('hidden');
      } else {
        loginLink.classList.remove('hidden');
        meusPedidos.classList.add('hidden');
        perfil.classList.add('hidden');
        logoutBtn.classList.add('hidden');
      }
    }
  }
  document.getElementById('sidebar-logout-btn')?.addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    clearFormData();
    localStorage.removeItem('cart');
    window.location.href = '/';
  });

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  }

  updateHeaderAuth();
  updateSidebarAuth();
  loadData();
</script>

<!-- Botão flutuante de acompanhamento (único) -->
<script src="/src/pages/floating-order-button.js"></script>
</body>

<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Finalizar Pedido - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ae2f34",
          "primary-container": "#ff6b6b",
          "secondary": "#006a65",
          "surface": "#fff8f7",
          "on-surface": "#251818",
          "on-surface-variant": "#584140",
          "surface-container-low": "#fff0ef",
          "error": "#ba1a1a"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background-color: #fff8f7; }
  .input-field { width: 100%; padding: 0.75rem; border-radius: 1rem; border: 1px solid #e0bfbd; background: white; transition: all 0.2s; }
  .input-field:focus { outline: none; border-color: #ae2f34; box-shadow: 0 0 0 2px rgba(174,47,52,0.2); }
</style>
</head>
<body>

<!-- Sidebar (mesmo de antes) -->
<div id="mobile-overlay" class="fixed inset-0 bg-black/50 z-40 hidden"></div>
<div id="sidebar" class="fixed top-0 left-0 w-64 h-full bg-surface-container-low border-r border-outline-variant/30 transform -translate-x-full transition-transform duration-300 z-50 flex flex-col">
  <div class="px-6 py-8 flex justify-between items-center border-b border-outline-variant/30">
    <div class="flex items-center gap-3">
      <img class="h-10 w-auto" src="https://bizrnjpmsyxdsflgpxcl.supabase.co/storage/v1/object/public/logos/ILOVE%20DELICITAS%20PNG%20OK.png" alt="Logo">
      <span class="text-primary font-headline font-bold text-lg">Menu</span>
    </div>
    <button id="close-sidebar-btn" class="text-on-surface-variant hover:text-primary">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
  <nav class="flex-1 px-4 py-6 space-y-2">
    <a href="/" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">home</span><span>Início</span></a>
    <a href="/cardapio" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">menu_book</span><span>Cardápio</span></a>
    <a href="/carrinho" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">shopping_cart</span><span>Carrinho</span></a>
    <div id="auth-links-sidebar">
      <a href="/meus-pedidos" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors" id="sidebar-meus-pedidos"><span class="material-symbols-outlined">receipt</span><span>Meus Pedidos</span></a>
      <a href="/perfil" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors" id="sidebar-perfil"><span class="material-symbols-outlined">person</span><span>Perfil</span></a>
      <button id="sidebar-logout-btn" class="hidden w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-error-container/20 text-error transition-colors"><span class="material-symbols-outlined">logout</span><span>Sair</span></button>
      <a href="/login" id="sidebar-login-link" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">login</span><span>Entrar</span></a>
    </div>
  </nav>
</div>

<header class="fixed top-0 w-full z-50 bg-[#fff8f7]/70 backdrop-blur-xl shadow-sm">
  <div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
    <div class="flex items-center gap-2">
      <button id="open-sidebar-btn" class="lg:hidden p-2 rounded-full hover:bg-surface-container-low transition-colors">
        <span class="material-symbols-outlined text-primary">menu</span>
      </button>
      <a href="/"><img class="h-12" src="https://bizrnjpmsyxdsflgpxcl.supabase.co/storage/v1/object/public/logos/ILOVE%20DELICITAS%20PNG%20OK.png"/></a>
    </div>
    <div class="flex items-center gap-4">
      <a href="/carrinho" class="relative p-2"><span class="material-symbols-outlined text-primary">shopping_bag</span><span id="cart-count" class="absolute -top-1 -right-1 bg-primary text-white text-xs w-5 h-5 rounded-full">0</span></a>
      <div id="user-menu" class="hidden flex items-center gap-3">
        <a href="/meus-pedidos" class="text-primary hover:underline text-sm">Meus pedidos</a>
        <a href="/perfil" class="text-primary hover:underline text-sm">Perfil</a>
        <span id="user-name" class="text-primary font-semibold"></span>
        <button id="logout-btn" class="text-sm bg-surface-container-low px-3 py-1 rounded-full hover:bg-surface-container transition">Sair</button>
      </div>
      <a href="/login" id="login-link" class="text-primary font-semibold hover:underline">Entrar</a>
    </div>
  </div>
</header>

<main class="pt-24 pb-32 px-4 max-w-4xl mx-auto">
  <h1 class="text-3xl font-bold text-primary mb-6">Finalizar Pedido</h1>
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <div class="bg-white rounded-2xl p-6 shadow-sm">
      <h2 class="text-xl font-bold mb-4">Dados para entrega</h2>
      <div class="space-y-4">
        <div><label class="block font-semibold mb-1">Nome completo *</label><input id="customer-name" class="input-field"></div>
        <div><label class="block font-semibold mb-1">Telefone (WhatsApp) *</label><input id="customer-phone" class="input-field"></div>
        <div><label class="block font-semibold mb-1">Endereço de entrega</label><input id="delivery-address" class="input-field"></div>
        <div><label class="block font-semibold mb-1">Tipo de entrega</label><select id="delivery-type" class="input-field"><option value="delivery">Delivery</option><option value="pickup">Retirada no local</option></select></div>
        <div><label class="block font-semibold mb-1">Forma de pagamento</label><select id="payment-method" class="input-field"><option value="pix">PIX</option><option value="cartao">Cartão</option><option value="dinheiro">Dinheiro</option></select></div>
      </div>
    </div>
    <div class="bg-white rounded-2xl p-6 shadow-sm">
      <h2 class="text-xl font-bold mb-4">Resumo do pedido</h2>
      <div id="cart-items-summary" class="space-y-3 max-h-64 overflow-y-auto"></div>
      <div class="border-t pt-4 mt-4 space-y-2">
        <div class="flex justify-between"><span>Subtotal</span><span id="subtotal">R$ 0,00</span></div>
        <div class="flex justify-between"><span>Entrega</span><span id="frete">R$ 7,00</span></div>
        <div class="flex justify-between text-secondary"><span>Desconto</span><span id="desconto">- R$ 0,00</span></div>
        <div class="flex justify-between text-lg font-bold text-primary"><span>Total</span><span id="total">R$ 0,00</span></div>
      </div>
      <button id="submit-order" class="w-full mt-6 bg-primary text-white py-3 rounded-full font-bold">Confirmar Pedido</button>
      <p id="error-message" class="text-error text-sm text-center mt-3 hidden"></p>
    </div>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let cart = [];
  let appliedCoupon = null;
  let userId = null;
  const freteFixo = 7.00;

  async function loadData() {
    const storedCart = localStorage.getItem('cart');
    cart = storedCart ? JSON.parse(storedCart) : [];
    const storedCoupon = localStorage.getItem('appliedCoupon');
    appliedCoupon = storedCoupon ? JSON.parse(storedCoupon) : null;
    updateCartCount();
    renderSummary();

    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      userId = session.user.id;
      const { data: profile } = await supabaseClient
        .from('profiles')
        .select('name, phone, address')
        .eq('id', userId)
        .single();
      if (profile) {
        if (profile.name) document.getElementById('customer-name').value = profile.name;
        if (profile.phone) document.getElementById('customer-phone').value = profile.phone;
        if (profile.address) document.getElementById('delivery-address').value = profile.address;
      }
    } else {
      userId = null;
    }
  }

  function updateCartCount() {
    const totalItems = cart.reduce((sum, i) => sum + (i.quantity || 1), 0);
    document.getElementById('cart-count').innerText = totalItems;
  }

  function renderSummary() {
    const container = document.getElementById('cart-items-summary');
    if (!cart.length) {
      container.innerHTML = '<div class="text-center py-4">Carrinho vazio. <a href="/cardapio" class="text-primary underline">Escolha produtos</a></div>';
      document.getElementById('submit-order').disabled = true;
      return;
    }
    let subtotal = 0;
    const itemsHtml = cart.map(item => {
      const itemTotal = (item.price_cents / 100) * (item.quantity || 1);
      subtotal += itemTotal;
      return `<div class="flex justify-between text-sm"><span>${item.quantity}x ${escapeHtml(item.name)}</span><span>R$ ${itemTotal.toFixed(2).replace('.', ',')}</span></div>`;
    }).join('');
    container.innerHTML = itemsHtml;
    let desconto = appliedCoupon ? (subtotal * appliedCoupon.desconto) / 100 : 0;
    const total = subtotal + freteFixo - desconto;
    document.getElementById('subtotal').innerText = `R$ ${subtotal.toFixed(2).replace('.', ',')}`;
    document.getElementById('frete').innerText = `R$ ${freteFixo.toFixed(2).replace('.', ',')}`;
    document.getElementById('desconto').innerText = `- R$ ${desconto.toFixed(2).replace('.', ',')}`;
    document.getElementById('total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
  }

  async function submitOrder() {
    const name = document.getElementById('customer-name').value.trim();
    const phone = document.getElementById('customer-phone').value.trim();
    const address = document.getElementById('delivery-address').value.trim();
    const deliveryType = document.getElementById('delivery-type').value;
    const payment = document.getElementById('payment-method').value;
    const errorEl = document.getElementById('error-message');
    errorEl.classList.add('hidden');
    if (!name || !phone) {
      errorEl.textContent = 'Preencha nome e telefone.';
      errorEl.classList.remove('hidden');
      return;
    }
    if (cart.length === 0) {
      errorEl.textContent = 'Carrinho vazio.';
      errorEl.classList.remove('hidden');
      return;
    }

    let subtotal = 0;
    cart.forEach(i => subtotal += (i.price_cents / 100) * (i.quantity || 1));
    const desconto = appliedCoupon ? (subtotal * appliedCoupon.desconto) / 100 : 0;
    const total = subtotal + freteFixo - desconto;
    const totalCents = Math.round(total * 100);

    // Preparar dados do pedido
    const orderData = {
      customer_name: name,
      customer_phone: phone,
      status: 'received',
      total_cents: totalCents,
      delivery_address: deliveryType === 'pickup' ? null : address,
      payment_method: payment,
      discount_cents: Math.round(desconto * 100),
      delivery_type: deliveryType,
      user_id: userId,
      items: cart.map(i => ({   // <-- Salva os itens também na coluna JSON
        name: i.name,
        quantity: i.quantity,
        price_cents: i.price_cents,
        line_total_cents: i.price_cents * (i.quantity || 1)
      })),
      created_at: new Date().toISOString()
    };

    // Inserir pedido
    const { data: order, error: orderError } = await supabaseClient
      .from('orders')
      .insert([orderData])
      .select();
    if (orderError) {
      console.error(orderError);
      errorEl.textContent = 'Erro ao criar pedido.';
      errorEl.classList.remove('hidden');
      return;
    }

    const orderId = order[0].id;

    // Inserir itens na tabela order_items (se falhar, não impede o pedido)
    const itemsToInsert = cart.map(i => ({
      order_id: orderId,
      product_name: i.name,
      quantity: i.quantity || 1,
      unit_price_cents: i.price_cents,
      line_total_cents: (i.price_cents * (i.quantity || 1))
    }));

    const { error: itemsError } = await supabaseClient
      .from('order_items')
      .insert(itemsToInsert);
    if (itemsError) {
      console.error('Erro ao inserir itens (tabela order_items):', itemsError);
      // Não impede o pedido – os itens já estão no campo items JSON
    }

    // Atualizar uso do cupom, se aplicado
    if (appliedCoupon && appliedCoupon.id) {
      await supabaseClient
        .from('cupons')
        .update({ usos_atual: (appliedCoupon.usos_atual || 0) + 1 })
        .eq('id', appliedCoupon.id);
    }

    // Limpar carrinho e cupom
    localStorage.removeItem('cart');
    localStorage.removeItem('appliedCoupon');

    // Redirecionar para página de confirmação
    window.location.href = `/pedido-confirmado?id=${orderId}`;
  }

  document.getElementById('submit-order').addEventListener('click', submitOrder);

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  }

  // Sidebar e auth (mesmo de antes)
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('mobile-overlay');
  const openBtn = document.getElementById('open-sidebar-btn');
  const closeBtn = document.getElementById('close-sidebar-btn');
  function closeSidebar() { sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden'); }
  function openSidebar() { sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden'); }
  if (openBtn) openBtn.addEventListener('click', openSidebar);
  if (closeBtn) closeBtn.addEventListener('click', closeSidebar);
  if (overlay) overlay.addEventListener('click', closeSidebar);
  document.querySelectorAll('#sidebar a, #sidebar button').forEach(link => link.addEventListener('click', () => { if (window.innerWidth < 1024) closeSidebar(); }));

  async function updateHeaderAuth() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    const userMenu = document.getElementById('user-menu');
    const loginLink = document.getElementById('login-link');
    if (session) {
      userMenu.classList.remove('hidden');
      loginLink.classList.add('hidden');
      const { data: profile } = await supabaseClient.from('profiles').select('name').eq('id', session.user.id).single();
      const userName = profile?.name || session.user.email.split('@')[0];
      document.getElementById('user-name').innerText = userName;
    } else {
      userMenu.classList.add('hidden');
      loginLink.classList.remove('hidden');
    }
  }
  document.getElementById('logout-btn')?.addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    localStorage.removeItem('cart');
    window.location.href = '/';
  });

  async function updateSidebarAuth() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    const loginLink = document.getElementById('sidebar-login-link');
    const meusPedidos = document.getElementById('sidebar-meus-pedidos');
    const perfil = document.getElementById('sidebar-perfil');
    const logoutBtn = document.getElementById('sidebar-logout-btn');
    if (session) {
      loginLink.classList.add('hidden');
      meusPedidos.classList.remove('hidden');
      perfil.classList.remove('hidden');
      logoutBtn.classList.remove('hidden');
    } else {
      loginLink.classList.remove('hidden');
      meusPedidos.classList.add('hidden');
      perfil.classList.add('hidden');
      logoutBtn.classList.add('hidden');
    }
  }
  document.getElementById('sidebar-logout-btn')?.addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    localStorage.removeItem('cart');
    window.location.href = '/';
  });

  updateHeaderAuth();
  updateSidebarAuth();
  loadData();
</script>
</body>
</html>

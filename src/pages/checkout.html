<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Finalizar Pedido - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- SUAS FONTES E CONFIGS -->
</head>
<body class="bg-gradient-to-br from-red-50 via-pink-50 to-orange-50 min-h-screen py-8 px-4">
  
  <!-- SEU HTML ORIGINAL (mantém design) -->
  <div id="aviso-frete-gratis" class="bg-gradient-to-r from-blue-50 to-cyan-50 border-2 border-blue-200 p-6 rounded-3xl shadow-glow">
    Calculando distância segura...
  </div>

<script>
// SUPABASE
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🔐 VARIÁVEIS DE CONTROLE
let isSubmitting = false;
let distanciaCalculada = false;
let distanciaKM = 999; // Default: longe
const LOJA_CEP = "13040120"; // ✅ NOVA CINTRA
const MAX_DISTANCIA = 3; // km
const FRETE_GRATIS_MIN = 50;

// 🔒 BOTÃO COMEÇA DESABILITADO
document.getElementById('btn-finalizar').disabled = true;

// 1️⃣ DISTÂNCIA VIA SUPABASE EDGE FUNCTION (CHAVE OCULTA) ✅
async function calcularDistancia(cepCliente) {
  try {
    // CHAMA EDGE FUNCTION (chave escondida no servidor)
    const { data, error } = await supabaseClient.functions.invoke('calcular-distancia', {
      body: { origem: LOJA_CEP, destino: cepCliente }
    });
    
    if (data && data.distance_km) {
      distanciaKM = data.distance_km;
      distanciaCalculada = true;
      atualizarAvisoFreteGratis(subtotal);
      verificarBotaoHabilitado();
      return true;
    }
  } catch(e) {
    console.error('Distância falhou:', e);
    distanciaKM = 999;
    atualizarAvisoFreteGratis(subtotal);
  }
  return false;
}

// 2️⃣ FRETE COM TODAS AS VERIFICAÇÕES ✅
function atualizarAvisoFreteGratis(subtotal) {
  const aviso = document.getElementById('aviso-frete-gratis');
  
  if (distanciaKM > MAX_DISTANCIA) {
    frete = 15.00;
    aviso.innerHTML = `
      <div class="text-center p-6">
        <span class="material-symbols-outlined text-5xl text-red-500 mb-4">location_off</span>
        <h2 class="text-2xl font-bold text-red-700 mb-2">❌ Fora da área</h2>
        <p class="text-red-600 mb-4">${distanciaKM.toFixed(1)}km (máx. ${MAX_DISTANCIA}km)</p>
        <a href="/cardapio" class="inline-block bg-gray-500 text-white px-6 py-3 rounded-xl font-bold">Ver lojas próximas</a>
      </div>
    `;
  } else if (subtotal >= FRETE_GRATIS_MIN) {
    frete = 0;
    aviso.innerHTML = `
      <div class="text-center p-8 bg-gradient-to-r from-emerald-100 to-green-100 rounded-3xl">
        <span class="material-symbols-outlined text-6xl text-emerald-500 mb-6">celebration</span>
        <h2 class="text-3xl font-black text-emerald-700 mb-4">🎉 FRETE GRÁTIS!</h2>
        <div class="space-y-2 text-emerald-700 font-semibold">
          <p>✅ Pedido: R$ ${subtotal.toFixed(2)}</p>
          <p>✅ Distância: ${distanciaKM.toFixed(1)}km ✓</p>
        </div>
      </div>
    `;
  } else {
    frete = 8.90;
    const faltou = (FRETE_GRATIS_MIN - subtotal).toFixed(2);
    aviso.innerHTML = `
      <div class="flex items-center justify-between p-6">
        <div>
          <h3 class="text-xl font-bold text-blue-800 mb-1">Frete grátis em R$ ${FRETE_GRATIS_MIN}</h3>
          <p class="text-sm text-blue-600">Faltam <strong>R$ ${faltou}</strong> | ${distanciaKM.toFixed(1)}km ✓</p>
        </div>
        <a href="/cardapio" class="bg-primary text-white px-6 py-3 rounded-2xl font-semibold hover:shadow-lg transition-all">+ Itens</a>
      </div>
    `;
  }
  calcularTotal();
}

// 🔓 BOTÃO SÓ ATIVA COM DISTÂNCIA CONFIRMADA ✅
function verificarBotaoHabilitado() {
  const btn = document.getElementById('btn-finalizar');
  const nome = document.getElementById('customer-name').value.trim();
  const telefone = document.getElementById('customer-phone').value.trim();
  
  if (distanciaCalculada && 
      distanciaKM <= MAX_DISTANCIA && 
      nome && telefone && 
      subtotal > 0) {
    btn.disabled = false;
    btn.classList.remove('opacity-50');
  } else {
    btn.disabled = true;
    btn.classList.add('opacity-50');
  }
}

// 3️⃣ SUBMIT BULLETPROOF ✅ ENDEREÇO + ANTI-DUPLICATA
async function submitOrder() {
  if (isSubmitting || !distanciaCalculada) return;
  
  isSubmitting = true;
  const btn = document.getElementById('btn-finalizar');
  btn.disabled = true;
  btn.innerHTML = `
    <span class="material-symbols-outlined mr-2">autorenew</span>
    Finalizando pedido...
  `;

  try {
    // ✅ CAPTURA ENDEREÇO COMPLETO
    const endereco = {
      cep: document.getElementById('cep').value,
      rua: document.getElementById('rua').value,
      numero: document.getElementById('numero').value,
      complemento: document.getElementById('complemento').value,
      bairro: document.getElementById('bairro').value,
      cidade: document.getElementById('cidade').value,
      uf: document.getElementById('uf').value,
      referencia: document.getElementById('referencia').value
    };

    const orderData = {
      customer_name: document.getElementById('customer-name').value,
      customer_phone: document.getElementById('customer-phone').value,
      customer_cpf: document.getElementById('cpf').value || null,
      endereco_completo: endereco, // ✅ SALVA ENDEREÇO
      subtotal: subtotal,
      frete: frete,
      total: total,
      delivery_type: document.getElementById('delivery-type').value,
      payment_method: document.getElementById('payment-method').value,
      distance_km: distanciaKM, // ✅ DISTÂNCIA CONFIRMADA
      status: 'received',
      items: cartItems,
      created_at: new Date().toISOString()
    };

    // SALVA
    const { data: order } = await supabaseClient
      .from('orders')
      .insert([orderData])
      .select()
      .single();

    // 🔔 BROADCAST CORRETO
    await supabaseClient.channel('admin-notifications').send({
      type: 'broadcast',
      event: 'new_order', // ✅ UNDERLINE
      payload: {
        orderId: order.id,
        customer: orderData.customer_name,
        total: total,
        distance_km: distanciaKM,
        endereco: endereco // ✅ ADMIN VÊ ENDEREÇO
      }
    });

    // LIMPA TUDO
    localStorage.clear();
    
    // ✅ REDIRECIONAMENTO SEGURO (funciona em qualquer roteamento)
    window.location.href = `./confirmacao.html?order_id=${order.id}`;
    
  } catch (error) {
    console.error(error);
    alert('Erro no pedido. Tente novamente.');
  } finally {
    isSubmitting = false;
    btn.disabled = false;
    btn.innerHTML = `🚀 Finalizar - R$ ${total.toFixed(2)}`;
  }
}

// 4️⃣ EVENTOS
document.getElementById('cep').addEventListener('blur', async function() {
  const cep = this.value.replace(/\D/g, '');
  if (cep.length === 8) {
    await calcularDistancia(cep);
  }
});

// PERSISTÊNCIA
document.querySelectorAll('input, select').forEach(el => {
  el.addEventListener('input', () => {
    debouncedSave();
    verificarBotaoHabilitado();
  });
});

// INICIALIZAÇÃO
window.addEventListener('load', () => {
  restoreFormData();
  verificarBotaoHabilitado();
});
</script>
</body>
</html>

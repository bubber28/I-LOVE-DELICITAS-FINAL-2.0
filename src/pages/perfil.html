<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Meu Perfil - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ae2f34",
          "primary-container": "#ff6b6b",
          "secondary": "#006a65",
          "surface": "#fff8f7",
          "on-surface": "#251818",
          "on-surface-variant": "#584140",
          "surface-container-low": "#fff0ef",
          "error": "#ba1a1a"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background-color: #fff8f7; }
  .input-field { width: 100%; padding: 0.75rem; border-radius: 1rem; border: 1px solid #e0bfbd; background: white; transition: all 0.2s; }
  .input-field:focus { outline: none; border-color: #ae2f34; box-shadow: 0 0 0 2px rgba(174,47,52,0.2); }
</style>
</head>
<body>

<!-- Sidebar (menu hambúrguer) -->
<div id="mobile-overlay" class="fixed inset-0 bg-black/50 z-40 hidden"></div>
<div id="sidebar" class="fixed top-0 left-0 w-64 h-full bg-surface-container-low border-r border-outline-variant/30 transform -translate-x-full transition-transform duration-300 z-50 flex flex-col">
  <div class="px-6 py-8 flex justify-between items-center border-b border-outline-variant/30">
    <div class="flex items-center gap-3">
      <img class="h-10 w-auto" src="https://bizrnjpmsyxdsflgpxcl.supabase.co/storage/v1/object/public/logos/ILOVE%20DELICITAS%20PNG%20OK.png" alt="Logo">
      <span class="text-primary font-headline font-bold text-lg">Menu</span>
    </div>
    <button id="close-sidebar-btn" class="text-on-surface-variant hover:text-primary">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
  <nav class="flex-1 px-4 py-6 space-y-2">
    <a href="/" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">home</span><span>Início</span></a>
    <a href="/cardapio" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">menu_book</span><span>Cardápio</span></a>
    <a href="/carrinho" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">shopping_cart</span><span>Carrinho</span></a>
    <div id="auth-links-sidebar">
      <a href="/meus-pedidos" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors" id="sidebar-meus-pedidos"><span class="material-symbols-outlined">receipt</span><span>Meus Pedidos</span></a>
      <a href="/perfil" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors" id="sidebar-perfil"><span class="material-symbols-outlined">person</span><span>Perfil</span></a>
      <button id="sidebar-logout-btn" class="hidden w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-error-container/20 text-error transition-colors"><span class="material-symbols-outlined">logout</span><span>Sair</span></button>
      <a href="/login" id="sidebar-login-link" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">login</span><span>Entrar</span></a>
    </div>
  </nav>
</div>

<header class="fixed top-0 w-full z-50 bg-[#fff8f7]/70 backdrop-blur-xl shadow-sm">
  <div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
    <div class="flex items-center gap-2">
      <button id="open-sidebar-btn" class="lg:hidden p-2 rounded-full hover:bg-surface-container-low transition-colors">
        <span class="material-symbols-outlined text-primary">menu</span>
      </button>
      <a href="/"><img class="h-12" src="https://bizrnjpmsyxdsflgpxcl.supabase.co/storage/v1/object/public/logos/ILOVE%20DELICITAS%20PNG%20OK.png"/></a>
    </div>
    <div class="flex items-center gap-4">
      <a href="/carrinho" class="relative p-2"><span class="material-symbols-outlined text-primary">shopping_bag</span><span id="cart-count" class="absolute -top-1 -right-1 bg-primary text-white text-xs w-5 h-5 rounded-full flex items-center justify-center leading-none font-semibold">0</span></a>
      <div id="user-menu" class="hidden flex items-center gap-3">
        <a href="/meus-pedidos" class="text-primary hover:underline text-sm">Meus pedidos</a>
        <a href="/perfil" class="text-primary hover:underline text-sm">Perfil</a>
        <span id="user-name" class="text-primary font-semibold"></span>
        <button id="logout-btn" class="text-sm bg-surface-container-low px-3 py-1 rounded-full hover:bg-surface-container transition">Sair</button>
      </div>
      <a href="/login" id="login-link" class="text-primary font-semibold hover:underline">Entrar</a>
    </div>
  </div>
</header>

<main class="pt-24 pb-32 px-4 max-w-md mx-auto">
  <div id="coupon-container" class="mb-6"></div>

  <div id="profile-container">
    <div class="bg-white rounded-2xl p-8 shadow-sm">
      <h1 class="text-2xl font-bold text-primary text-center mb-6">Meu Perfil</h1>
      <form id="profile-form" class="space-y-4">
        <div><label class="block font-semibold mb-1">Nome completo</label><input type="text" id="name" class="input-field" required></div>
        <div><label class="block font-semibold mb-1">Telefone (WhatsApp)</label><input type="tel" id="phone" class="input-field" required></div>
        <!-- NOVO CAMPO CPF -->
        <div>
          <label class="block font-semibold mb-1">CPF</label>
          <input type="text" id="cpf" class="input-field" placeholder="000.000.000-00" maxlength="14">
          <p class="text-xs text-on-surface-variant mt-1">Apenas números – será formatado automaticamente.</p>
        </div>
        <div><label class="block font-semibold mb-1">Endereço</label><input type="text" id="address" class="input-field"></div>
        <div><label class="block font-semibold mb-1">E-mail</label><input type="email" id="email" class="input-field" readonly disabled></div>
        <button type="submit" class="w-full bg-primary text-white py-3 rounded-full font-bold">Salvar alterações</button>
      </form>
      <div class="mt-4 text-center"><button id="change-password-btn" class="text-primary underline">Alterar senha</button></div>
      <p id="error-message" class="text-error text-sm text-center mt-3 hidden"></p>
      <p id="success-message" class="text-secondary text-sm text-center mt-3 hidden"></p>
    </div>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let _activeCouponData = null;

  function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const totalItems = cart.reduce((sum, i) => sum + (i.quantity || 1), 0);
    document.getElementById('cart-count').innerText = totalItems;
  }
  updateCartCount();

  // Máscara de CPF
  function formatCPF(value) {
    value = value.replace(/\D/g, '');
    if (value.length > 11) value = value.slice(0, 11);
    if (value.length > 9) {
      value = value.replace(/^(\d{3})(\d{3})(\d{3})(\d{2})$/, '$1.$2.$3-$4');
    } else if (value.length > 6) {
      value = value.replace(/^(\d{3})(\d{3})(\d{0,3})$/, '$1.$2.$3');
    } else if (value.length > 3) {
      value = value.replace(/^(\d{3})(\d{0,3})$/, '$1.$2');
    }
    return value;
  }

  async function loadProfile() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) { window.location.href = '/login'; return; }
    const userId = session.user.id;
    const userEmail = session.user.email;

    const { data: profile, error } = await supabaseClient
      .from('profiles')
      .select('name, phone, address, cpf')
      .eq('id', userId)
      .single();
    if (error && error.code !== 'PGRST116') console.error(error);

    document.getElementById('name').value = profile?.name || '';
    document.getElementById('phone').value = profile?.phone || '';
    document.getElementById('address').value = profile?.address || '';
    document.getElementById('cpf').value = profile?.cpf ? formatCPF(profile.cpf) : '';
    document.getElementById('email').value = userEmail;

    const userName = profile?.name || userEmail.split('@')[0];
    document.getElementById('user-name').innerText = userName;
    document.getElementById('user-menu').classList.remove('hidden');
    document.getElementById('login-link').classList.add('hidden');

    loadUserCoupon();
  }

  // Aplicar máscara enquanto digita
  const cpfInput = document.getElementById('cpf');
  if (cpfInput) {
    cpfInput.addEventListener('input', function(e) {
      this.value = formatCPF(this.value);
    });
  }

  const form = document.getElementById('profile-form');
  const errorEl = document.getElementById('error-message');
  const successEl = document.getElementById('success-message');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.classList.add('hidden');
    successEl.classList.add('hidden');

    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) return;
    const userId = session.user.id;
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const address = document.getElementById('address').value.trim();
    let cpf = document.getElementById('cpf').value.replace(/\D/g, '');
    if (cpf && cpf.length !== 11) {
      errorEl.textContent = 'CPF inválido. Deve ter 11 dígitos.';
      errorEl.classList.remove('hidden');
      return;
    }
    if (cpf === '') cpf = null; // permite salvar vazio

    const { error } = await supabaseClient
      .from('profiles')
      .upsert({ id: userId, name, phone, address, cpf, email: session.user.email, updated_at: new Date().toISOString() });
    if (error) {
      errorEl.textContent = error.message;
      errorEl.classList.remove('hidden');
    } else {
      successEl.textContent = 'Perfil atualizado com sucesso!';
      successEl.classList.remove('hidden');
      document.getElementById('user-name').innerText = name || session.user.email.split('@')[0];
    }
  });

  document.getElementById('change-password-btn').addEventListener('click', () => {
    window.location.href = '/reset-password?from=profile';
  });

  document.getElementById('logout-btn')?.addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    localStorage.removeItem('cart');
    window.location.href = '/';
  });

  // Sidebar
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('mobile-overlay');
  const openBtn = document.getElementById('open-sidebar-btn');
  const closeBtn = document.getElementById('close-sidebar-btn');
  function closeSidebar() { sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden'); }
  function openSidebar() { sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden'); }
  if (openBtn) openBtn.addEventListener('click', openSidebar);
  if (closeBtn) closeBtn.addEventListener('click', closeSidebar);
  if (overlay) overlay.addEventListener('click', closeSidebar);
  document.querySelectorAll('#sidebar a, #sidebar button').forEach(link => link.addEventListener('click', () => { if (window.innerWidth < 1024) closeSidebar(); }));

  async function updateSidebarAuth() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    const loginLink = document.getElementById('sidebar-login-link');
    const meusPedidos = document.getElementById('sidebar-meus-pedidos');
    const perfil = document.getElementById('sidebar-perfil');
    const logoutBtn = document.getElementById('sidebar-logout-btn');
    if (session) {
      loginLink.classList.add('hidden');
      meusPedidos.classList.remove('hidden');
      perfil.classList.remove('hidden');
      logoutBtn.classList.remove('hidden');
    } else {
      loginLink.classList.remove('hidden');
      meusPedidos.classList.add('hidden');
      perfil.classList.add('hidden');
      logoutBtn.classList.add('hidden');
    }
  }
  document.getElementById('sidebar-logout-btn')?.addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    localStorage.removeItem('cart');
    window.location.href = '/';
  });

  async function loadUserCoupon() {
    const container = document.getElementById('coupon-container');
    if (!container) return;

    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) return; // loadProfile já trata o redirect

    container.innerHTML = `
      <div class="rounded-2xl px-6 py-5 text-center" style="background:linear-gradient(135deg,#3b1a0a,#6b3520);">
        <p class="text-amber-200 text-sm animate-pulse">Carregando seu presente...</p>
      </div>`;

    let data, ok;
    try {
      const res = await fetch('/api/user/coupon', {
        headers: { 'Authorization': `Bearer ${session.access_token}` }
      });

      if (res.status === 401) {
        await supabaseClient.auth.signOut();
        window.location.href = '/login';
        return;
      }

      ok = res.ok;
      data = ok ? await res.json() : null;
    } catch (err) {
      console.error('Erro ao carregar cupom:', err);
      container.innerHTML = '';
      return;
    }

    const emptyState = `
      <div class="rounded-2xl px-6 py-5 text-center" style="background:linear-gradient(135deg,#3b1a0a,#6b3520);">
        <p class="text-amber-200 text-sm">🎁 Seu cupom já foi usado ou expirou. Volte sempre!</p>
      </div>`;

    if (!ok || !data || !data.code) { container.innerHTML = emptyState; return; }

    const expiry = new Date(data.expires_at);
    if (isNaN(expiry) || expiry < new Date()) { container.innerHTML = emptyState; return; }

    _activeCouponData = {
      ...data,
      desconto: Number(data.desconto ?? data.discount_percent ?? data.percent ?? 50),
      usos_atual: Number(data.usos_atual ?? 0)
    };

    const formattedDate = expiry.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
    const safeCode = data.code.replace(/['"<>&]/g, c => ({'\'':'&#39;','"':'&quot;','<':'&lt;','>':'&gt;','&':'&amp;'}[c]));

    container.innerHTML = `
      <div class="rounded-2xl overflow-hidden shadow-xl" style="background:linear-gradient(135deg,#3b1a0a 0%,#6b3520 55%,#3b1a0a 100%);">
        <div class="px-6 pt-6 pb-3 text-center">
          <p class="text-amber-300 font-headline font-extrabold text-xl leading-tight">🎉 Você ganhou 50% de DESCONTO!</p>
          <p class="text-amber-100/70 text-xs mt-1">Use o código abaixo no próximo pedido</p>
        </div>
        <div class="mx-4 mb-2 rounded-xl border-2 border-dashed px-6 py-4 text-center" style="border-color:rgba(212,175,55,0.55);background:rgba(0,0,0,0.25);">
          <span class="font-headline font-extrabold text-3xl tracking-widest select-all" style="color:#f0c040;">${safeCode}</span>
        </div>
        <p class="text-center text-xs mb-4" style="color:rgba(240,192,64,0.65);">Válido até ${formattedDate}</p>
        <div class="flex gap-3 px-4 pb-6">
          <button id="copy-coupon-btn"
            class="flex-1 flex items-center justify-center gap-2 py-3 rounded-full font-bold text-sm transition-all"
            style="background:rgba(212,175,55,0.2);color:#f0c040;border:1px solid rgba(212,175,55,0.45);"
            onclick="copyCoupon('${safeCode}')">
            <span class="material-symbols-outlined" style="font-size:18px;">content_copy</span>
            Copiar código
          </button>
          <button onclick="useCouponNow()"
            class="flex-1 flex items-center justify-center gap-2 py-3 rounded-full font-bold text-sm text-white transition-all hover:scale-105"
            style="background:linear-gradient(135deg,#10b981,#059669);box-shadow:0 4px 15px rgba(16,185,129,0.45);">
            <span class="material-symbols-outlined" style="font-size:18px;">shopping_bag</span>
            Usar agora
          </button>
        </div>
      </div>`;
  }

  function useCouponNow() {
    if (_activeCouponData) {
      localStorage.setItem('appliedCoupon', JSON.stringify(_activeCouponData));
    }
    window.location.href = '/checkout';
  }

  function copyCoupon(code) {
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.getElementById('copy-coupon-btn');
      if (!btn) return;
      const original = btn.innerHTML;
      btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px;">check_circle</span> Copiado!';
      btn.style.color = '#86efac';
      setTimeout(() => { btn.innerHTML = original; btn.style.color = '#f0c040'; }, 2000);
    }).catch(() => {
      const el = document.createElement('textarea');
      el.value = code;
      el.style.position = 'fixed';
      el.style.opacity = '0';
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
    });
  }

  loadProfile();
  updateSidebarAuth();
</script>
</body>
</html>

<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>I Love Delicitas - Sabor que vira memória</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ae2f34",
          "primary-container": "#ff6b6b",
          "secondary": "#006a65",
          "surface": "#fff8f7",
          "on-surface": "#251818",
          "on-surface-variant": "#584140",
          "surface-container-low": "#fff0ef",
          "error": "#ba1a1a"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { min-height: 100dvh; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  /* Ajuste para imagens dos produtos */
  .product-card img {
    width: 100%;
    height: 180px;
    object-fit: contain;
    transition: transform 0.3s;
  }
  .product-card:hover img {
    transform: scale(1.05);
  }
  @media (max-width: 640px) {
    .product-card img {
      height: 140px;
    }
  }
</style>
</head>
<body class="bg-background text-on-surface font-body">

<header class="fixed top-0 w-full z-50 bg-[#fff8f7]/70 backdrop-blur-xl shadow-sm">
  <nav class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto">
    <a href="/">
      <img alt="Logo" class="h-12 w-auto" src="https://lh3.googleusercontent.com/aida/ADBb0ug9pEscIuL2DlpA17jlxEDClMUUl57IcXfA7OVPOBmhp5sAf7PwxKnpbI1tY9CcPsm_Q_lnh_6nc7K9s-Ufu8Vl1c-OjwARYp7iAHfnZcmG0DBwt67Xn07BOzLg_PKmoimX0VhBx_7sWyf5BR1B5okOzwW7leBDUVxtd-hraOOegasbSbL6SufvbUq093ykJtCjJbgzAXz6oOZhTDNVOwf2jgT_67YQ89bs9nwJk_awO3yEeaN9p4lZbmtoAwd21a5JeopnxomDwkc"/>
    </a>
    <a href="/carrinho" class="relative p-2 rounded-full hover:bg-[#fff0ef]">
      <span class="material-symbols-outlined text-primary">shopping_bag</span>
      <span id="cart-count" class="absolute -top-1 -right-1 bg-primary text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">0</span>
    </a>
  </nav>
</header>

<main class="pt-24 pb-32 px-4 max-w-7xl mx-auto">
  <section class="mb-12">
    <h1 class="font-headline font-extrabold text-4xl md:text-6xl text-on-surface mb-6">Sabor que vira <span class="text-primary">memória</span> em cada pedido</h1>
    <p class="text-on-surface-variant text-lg md:text-xl mb-8">Personalize sua caixa de doces, agende a entrega e receba tudo fresquinho ainda hoje.</p>
    <div class="flex flex-col sm:flex-row gap-4">
      <a href="/cardapio" class="bg-primary text-white px-8 py-4 rounded-full font-semibold text-center">Pedir agora</a>
      <div class="flex gap-2">
        <input type="text" id="order-id-input" placeholder="Nº do pedido" class="bg-surface-container text-primary px-4 py-4 rounded-full border border-outline-variant text-center">
        <button id="track-order-btn" class="bg-surface-container text-primary px-8 py-4 rounded-full font-semibold">Acompanhar pedido</button>
      </div>
    </div>
  </section>

  <section class="mb-16">
    <div class="flex justify-between mb-8">
      <h2 class="font-headline font-bold text-2xl">Categorias</h2>
      <a href="/cardapio" class="text-primary text-sm">Ver todas</a>
    </div>
    <div id="categories-container" class="flex overflow-x-auto gap-4 pb-4 no-scrollbar">
      <div class="text-center py-8 w-full">Carregando categorias...</div>
    </div>
  </section>

  <section>
    <h2 class="font-headline font-bold text-2xl mb-8">Mais pedidos da semana</h2>
    <div id="products-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
      <div class="text-center py-8 col-span-full">Carregando produtos...</div>
    </div>
  </section>
</main>

<footer class="bg-[#fff0ef] py-12 text-center">
  <p>© 2025 I Love Delicitas. Doce momento.</p>
</footer>

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const totalItems = cart.reduce((sum, i) => sum + (i.quantity || 1), 0);
    const cartCountSpan = document.getElementById('cart-count');
    if (cartCountSpan) cartCountSpan.innerText = totalItems;
  }
  updateCartCount();

  async function loadCategories() {
    const { data } = await supabaseClient.from('categories').select('*').order('name');
    const container = document.getElementById('categories-container');
    if (!data || data.length === 0) {
      container.innerHTML = '<div class="text-center py-8">Nenhuma categoria encontrada</div>';
      return;
    }
    container.innerHTML = data.map(cat => `
      <div class="flex-none w-40 h-48 bg-surface-container-low rounded-lg p-6 flex flex-col justify-between hover:bg-surface-container cursor-pointer" onclick="location.href='/cardapio?categoria=${cat.id}'">
        <span class="material-symbols-outlined text-4xl text-primary">category</span>
        <span class="font-headline font-bold">${escapeHtml(cat.name)}</span>
      </div>
    `).join('');
  }

  async function loadProducts() {
    const { data } = await supabaseClient
      .from('products')
      .select('*')
      .eq('active', true)
      .gt('stock', 0)
      .order('created_at', { ascending: false })
      .limit(6);
    const container = document.getElementById('products-container');
    if (!data || data.length === 0) {
      container.innerHTML = '<div class="text-center py-8">Nenhum produto disponível</div>';
      return;
    }
    container.innerHTML = data.map(prod => `
      <div class="product-card bg-white rounded-lg p-6 shadow-sm hover:shadow-md transition-shadow">
        <div class="h-48 mb-4 flex items-center justify-center">
          <img class="max-h-full object-contain" src="${prod.image_url || 'https://placehold.co/300x200?text=Delícia'}" alt="${escapeHtml(prod.name)}">
        </div>
        <h3 class="font-headline font-bold text-xl">${escapeHtml(prod.name)}</h3>
        <p class="text-sm text-on-surface-variant mb-4 line-clamp-2">${escapeHtml(prod.description || 'Delícia artesanal')}</p>
        <div class="flex justify-between items-center">
          <span class="text-2xl font-black">R$ ${(prod.price_cents / 100).toFixed(2).replace('.', ',')}</span>
          <button onclick="addToCart('${prod.id}', '${escapeHtml(prod.name)}', ${prod.price_cents}, '${prod.image_url || ''}')" class="bg-secondary text-white p-3 rounded-full hover:scale-110 transition">+</button>
        </div>
      </div>
    `).join('');
  }

  function addToCart(id, name, priceCents, imageUrl) {
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const existing = cart.find(i => i.id === id);
    if (existing) existing.quantity = (existing.quantity || 1) + 1;
    else cart.push({ id, name, price_cents: priceCents, quantity: 1, image_url: imageUrl });
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    alert('Produto adicionado ao carrinho!');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  }

  document.getElementById('track-order-btn').addEventListener('click', () => {
    const id = document.getElementById('order-id-input').value.trim();
    if (id) window.location.href = `/acompanhamento?id=${id}`;
    else alert('Digite o número do pedido.');
  });

  loadCategories();
  loadProducts();
</script>
</body>
</html>

<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cardápio - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ae2f34",
          "primary-container": "#ff6b6b",
          "secondary": "#006a65",
          "surface": "#fff8f7",
          "on-surface": "#251818",
          "on-surface-variant": "#584140",
          "surface-container-low": "#fff0ef",
          "error": "#ba1a1a"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background-color: #fff8f7; min-height: 100dvh; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .product-card {
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .product-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 40px -10px rgba(174,47,52,0.2);
  }
  .line-clamp-1 {
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .product-image {
    aspect-ratio: 1 / 1;
    object-fit: cover;
    width: 100%;
    height: auto;
    border-radius: 1rem;
  }
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background-color: #10b981;
    color: white;
    padding: 12px 24px;
    border-radius: 9999px;
    font-weight: 600;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
  }
  @media (max-width: 640px) {
    .toast { white-space: normal; text-align: center; width: 90%; font-size: 14px; }
    .product-card { border-radius: 1rem; }
    .product-card .p-4 { padding: 0.75rem; }
    .product-card h3 { font-size: 0.85rem; }
    .product-card .text-xl { font-size: 1rem; }
  }
</style>
</head>
<body class="bg-surface text-on-surface">

<!-- Sidebar (menu hambúrguer) - mesmo código do index -->
<div id="mobile-overlay" class="fixed inset-0 bg-black/50 z-40 hidden"></div>
<div id="sidebar" class="fixed top-0 left-0 w-64 h-full bg-surface-container-low border-r border-outline-variant/30 transform -translate-x-full transition-transform duration-300 z-50 flex flex-col">
  <div class="px-6 py-8 flex justify-between items-center border-b border-outline-variant/30">
    <div class="flex items-center gap-3">
      <img class="h-10 w-auto" src="https://bizrnjpmsyxdsflgpxcl.supabase.co/storage/v1/object/public/logos/ILOVE%20DELICITAS%20PNG%20OK.png" alt="Logo">
      <span class="text-primary font-headline font-bold text-lg">Menu</span>
    </div>
    <button id="close-sidebar-btn" class="text-on-surface-variant hover:text-primary">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
  <nav class="flex-1 px-4 py-6 space-y-2">
    <a href="/" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors">
      <span class="material-symbols-outlined">home</span>
      <span>Início</span>
    </a>
    <a href="/cardapio" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors">
      <span class="material-symbols-outlined">menu_book</span>
      <span>Cardápio</span>
    </a>
    <a href="/carrinho" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors">
      <span class="material-symbols-outlined">shopping_cart</span>
      <span>Carrinho</span>
    </a>
    <div id="auth-links-sidebar">
      <a href="/meus-pedidos" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors" id="sidebar-meus-pedidos">
        <span class="material-symbols-outlined">receipt</span>
        <span>Meus Pedidos</span>
      </a>
      <a href="/perfil" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors" id="sidebar-perfil">
        <span class="material-symbols-outlined">person</span>
        <span>Perfil</span>
      </a>
      <button id="sidebar-logout-btn" class="hidden w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-error-container/20 text-error transition-colors">
        <span class="material-symbols-outlined">logout</span>
        <span>Sair</span>
      </button>
      <a href="/login" id="sidebar-login-link" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container-high transition-colors">
        <span class="material-symbols-outlined">login</span>
        <span>Entrar</span>
      </a>
    </div>
  </nav>
</div>

<header class="fixed top-0 w-full z-50 bg-[#fff8f7]/70 backdrop-blur-xl shadow-sm">
  <div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
    <div class="flex items-center gap-2">
      <button id="open-sidebar-btn" class="lg:hidden p-2 rounded-full hover:bg-surface-container-low transition-colors">
        <span class="material-symbols-outlined text-primary">menu</span>
      </button>
      <a href="/"><img class="h-12" src="https://bizrnjpmsyxdsflgpxcl.supabase.co/storage/v1/object/public/logos/ILOVE%20DELICITAS%20PNG%20OK.png"/></a>
    </div>
    <div class="flex items-center gap-4">
      <a href="/carrinho" class="relative p-2"><span class="material-symbols-outlined text-primary">shopping_bag</span><span id="cart-count" class="absolute -top-1 -right-1 bg-primary text-white text-xs w-5 h-5 rounded-full flex items-center justify-center leading-none font-semibold">0</span></a>
      <div id="user-menu" class="hidden flex items-center gap-3">
        <a href="/meus-pedidos" class="text-primary hover:underline text-sm">Meus pedidos</a>
        <a href="/perfil" class="text-primary hover:underline text-sm">Perfil</a>
        <span id="user-name" class="text-primary font-semibold"></span>
        <button id="logout-btn" class="text-sm bg-surface-container-low px-3 py-1 rounded-full hover:bg-surface-container transition">Sair</button>
      </div>
      <a href="/login" id="login-link" class="text-primary font-semibold hover:underline">Entrar</a>
    </div>
  </div>
</header>

<main class="pt-24 pb-32 px-4 max-w-7xl mx-auto">
  <h1 class="text-3xl font-bold mb-6">Cardápio</h1>

  <div class="mb-8 overflow-x-auto no-scrollbar">
    <div id="category-filters" class="flex gap-2 pb-2">
      <button data-category="all" class="category-filter bg-primary text-white px-4 py-2 rounded-full text-sm font-semibold">Todos</button>
    </div>
  </div>

  <div id="products-list" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
    <div class="text-center py-8 col-span-full">Carregando produtos...</div>
  </div>
</main>

<footer class="bg-[#fff0ef] py-12 text-center">
  <p class="font-semibold">I Love Delicitas</p>
  <p class="text-sm text-on-surface-variant mt-1">CNPJ: 61.316.392/0001-97</p>
  <p class="text-sm mt-1">© 2026 I Love Delicitas. Todos os direitos reservados.</p>
</footer>

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let categories = [];
  let allProducts = [];
  let currentCategory = 'all';

  function showToast(message, isError = false) {
    const existingToast = document.querySelector('.toast');
    if (existingToast) existingToast.remove();

    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    if (isError) toast.style.backgroundColor = '#ba1a1a';
    else toast.style.backgroundColor = '#10b981';
    document.body.appendChild(toast);
    toast.offsetHeight;
    toast.style.opacity = '1';
    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }, 2000);
  }

  function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const totalItems = cart.reduce((sum, i) => sum + (i.quantity || 1), 0);
    document.getElementById('cart-count').innerText = totalItems;
  }
  updateCartCount();

  function getSafeImageSrc(value, fallback) {
    if (!value) return fallback;
    try {
      const resolved = new URL(value, window.location.origin);
      return /^https?:$/i.test(resolved.protocol) ? resolved.href : fallback;
    } catch (err) {
      return fallback;
    }
  }

  function createProductCard(prod) {
    const imageFallback = 'https://placehold.co/300x300/fff0ef/ae2f34?text=🍰+Delícia';
    const card = document.createElement('div');
    card.className = 'bg-white rounded-2xl overflow-hidden shadow-sm product-card cursor-pointer group';

    const imageWrapper = document.createElement('div');
    imageWrapper.className = 'relative overflow-hidden';

    const image = document.createElement('img');
    image.className = 'w-full aspect-square object-cover transition-transform duration-500 group-hover:scale-110';
    image.src = getSafeImageSrc(prod.image_url, imageFallback);
    image.alt = prod.name || 'Produto';
    image.loading = 'lazy';
    imageWrapper.appendChild(image);

    const overlay = document.createElement('div');
    overlay.className = 'absolute inset-0 bg-gradient-to-t from-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300';
    imageWrapper.appendChild(overlay);

    if ((prod.stock || 0) < 5) {
      const badge = document.createElement('span');
      badge.className = 'absolute top-2 left-2 bg-primary text-white text-xs px-2 py-1 rounded-full font-bold animate-pulse';
      badge.textContent = '⚡ Últimas unidades!';
      imageWrapper.appendChild(badge);
    }

    const iconButton = document.createElement('button');
    iconButton.type = 'button';
    iconButton.className = 'absolute bottom-2 right-2 bg-primary text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg opacity-0 group-hover:opacity-100 transition-all duration-300 hover:scale-110';
    iconButton.dataset.id = prod.id;
    iconButton.dataset.name = prod.name || '';
    iconButton.dataset.price = String(prod.price_cents || 0);
    iconButton.dataset.image = prod.image_url || '';
    iconButton.addEventListener('click', (event) => {
      event.stopPropagation();
      addToCart(iconButton.dataset.id, iconButton.dataset.name, Number(iconButton.dataset.price), iconButton.dataset.image);
    });
    const icon = document.createElement('span');
    icon.className = 'material-symbols-outlined text-sm';
    icon.textContent = 'add';
    iconButton.appendChild(icon);
    imageWrapper.appendChild(iconButton);
    card.appendChild(imageWrapper);

    const content = document.createElement('div');
    content.className = 'p-4';

    const title = document.createElement('h3');
    title.className = 'font-headline font-bold text-base mb-1 line-clamp-1';
    title.textContent = prod.name || 'Produto';
    content.appendChild(title);

    const description = document.createElement('p');
    description.className = 'text-xs text-on-surface-variant mb-3 line-clamp-2 min-h-[2rem]';
    description.textContent = prod.description || 'Delícia artesanal';
    content.appendChild(description);

    const footer = document.createElement('div');
    footer.className = 'flex justify-between items-end sm:items-center gap-2';

    const priceWrap = document.createElement('div');
    const price = document.createElement('span');
    price.className = 'text-lg sm:text-xl font-black text-primary leading-none';
    price.textContent = `R$ ${((prod.price_cents || 0) / 100).toFixed(2).replace('.', ',')}`;
    priceWrap.appendChild(price);
    footer.appendChild(priceWrap);

    const addButton = document.createElement('button');
    addButton.type = 'button';
    addButton.className = 'flex items-center justify-center gap-0.5 sm:gap-1 shrink-0 bg-primary text-white px-2.5 sm:px-4 py-1.5 sm:py-2 rounded-full text-[10px] sm:text-xs font-bold leading-tight hover:scale-105 hover:shadow-lg hover:shadow-primary/30 transition-all whitespace-nowrap';
    addButton.dataset.id = prod.id;
    addButton.dataset.name = prod.name || '';
    addButton.dataset.price = String(prod.price_cents || 0);
    addButton.dataset.image = prod.image_url || '';
    addButton.addEventListener('click', () => {
      addToCart(addButton.dataset.id, addButton.dataset.name, Number(addButton.dataset.price), addButton.dataset.image);
    });
    const addIcon = document.createElement('span');
    addIcon.className = 'material-symbols-outlined text-xs sm:text-sm';
    addIcon.textContent = 'add';
    addButton.append(addIcon, document.createTextNode(' Adicionar'));
    footer.appendChild(addButton);

    content.appendChild(footer);
    card.appendChild(content);
    return card;
  }

  async function loadCategories() {
    const { data } = await supabaseClient.from('categories').select('*').order('name');
    categories = data || [];
    const container = document.getElementById('category-filters');
    container.innerHTML = '<button data-category="all" class="category-filter bg-primary text-white px-4 py-2 rounded-full text-sm font-semibold">Todos</button>';
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.innerText = cat.name;
      btn.dataset.category = cat.id;
      btn.className = 'category-filter bg-surface-container-low text-on-surface-variant px-4 py-2 rounded-full text-sm font-semibold hover:bg-primary-container transition';
      container.appendChild(btn);
    });
    document.querySelectorAll('.category-filter').forEach(btn => {
      btn.addEventListener('click', () => {
        currentCategory = btn.dataset.category;
        document.querySelectorAll('.category-filter').forEach(b => {
          if (b.dataset.category === currentCategory) {
            b.classList.add('bg-primary', 'text-white');
            b.classList.remove('bg-surface-container-low', 'text-on-surface-variant');
          } else {
            b.classList.remove('bg-primary', 'text-white');
            b.classList.add('bg-surface-container-low', 'text-on-surface-variant');
          }
        });
        renderProducts();
      });
    });
  }

  async function loadProducts() {
    const { data } = await supabaseClient
      .from('products')
      .select('*')
      .eq('active', true)
      .gt('stock', 0)
      .order('name');
    allProducts = data || [];
    renderProducts();
  }

  function renderProducts() {
    const container = document.getElementById('products-list');
    let filtered = allProducts;
    if (currentCategory !== 'all') {
      filtered = allProducts.filter(p => p.category_id === currentCategory);
    }
    if (filtered.length === 0) {
      container.innerHTML = '<div class="text-center py-8 col-span-full">Nenhum produto encontrado nesta categoria.</div>';
      return;
    }
    container.textContent = '';
    const fragment = document.createDocumentFragment();
    filtered.forEach((prod) => {
      fragment.appendChild(createProductCard(prod));
    });
    container.appendChild(fragment);
  }

  function addToCart(id, name, priceCents, imageUrl) {
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const existing = cart.find(i => i.id === id);
    if (existing) existing.quantity = (existing.quantity || 1) + 1;
    else cart.push({ id, name, price_cents: priceCents, quantity: 1, image_url: imageUrl });
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    showToast(`✅ ${name} adicionado ao carrinho!`);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str
      .replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]))
      .replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, (c) => c)
      .replace(/'/g, '&#39;')
      .replace(/"/g, '&quot;');
  }

  // ================== HEADER AUTH ==================
  async function updateHeaderAuth() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    const userMenu = document.getElementById('user-menu');
    const loginLink = document.getElementById('login-link');
    if (session) {
      userMenu.classList.remove('hidden');
      loginLink.classList.add('hidden');
      const { data: profile } = await supabaseClient.from('profiles').select('name').eq('id', session.user.id).single();
      const userName = profile?.name || session.user.email.split('@')[0];
      document.getElementById('user-name').innerText = userName;
    } else {
      userMenu.classList.add('hidden');
      loginLink.classList.remove('hidden');
    }
  }
  document.getElementById('logout-btn')?.addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    localStorage.removeItem('cart');
    window.location.href = '/';
  });

  // ================== SIDEBAR ==================
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('mobile-overlay');
  const openBtn = document.getElementById('open-sidebar-btn');
  const closeBtn = document.getElementById('close-sidebar-btn');
  function closeSidebar() { sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden'); }
  function openSidebar() { sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden'); }
  if (openBtn) openBtn.addEventListener('click', openSidebar);
  if (closeBtn) closeBtn.addEventListener('click', closeSidebar);
  if (overlay) overlay.addEventListener('click', closeSidebar);
  document.querySelectorAll('#sidebar a, #sidebar button').forEach(link => link.addEventListener('click', () => { if (window.innerWidth < 1024) closeSidebar(); }));

  async function updateSidebarAuth() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    const loginLink = document.getElementById('sidebar-login-link');
    const meusPedidos = document.getElementById('sidebar-meus-pedidos');
    const perfil = document.getElementById('sidebar-perfil');
    const logoutBtn = document.getElementById('sidebar-logout-btn');
    if (session) {
      loginLink.classList.add('hidden');
      meusPedidos.classList.remove('hidden');
      perfil.classList.remove('hidden');
      logoutBtn.classList.remove('hidden');
    } else {
      loginLink.classList.remove('hidden');
      meusPedidos.classList.add('hidden');
      perfil.classList.add('hidden');
      logoutBtn.classList.add('hidden');
    }
  }
  document.getElementById('sidebar-logout-btn')?.addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    localStorage.removeItem('cart');
    window.location.href = '/';
  });

  updateHeaderAuth();
  updateSidebarAuth();
  loadCategories();
  loadProducts();
</script>
</body>
</html>

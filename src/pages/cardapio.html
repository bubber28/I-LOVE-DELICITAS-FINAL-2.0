<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cardápio - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ae2f34",
          "primary-container": "#ff6b6b",
          "secondary": "#006a65",
          "surface": "#fff8f7",
          "on-surface": "#251818",
          "on-surface-variant": "#584140",
          "surface-container-low": "#fff0ef",
          "error": "#ba1a1a"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  :root { --brand-primary: #ae2f34; --brand-secondary: #006a65; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background-color: #fff8f7; min-height: 100dvh; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .product-card { transition: transform 0.3s, box-shadow 0.3s; }
  .product-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px -10px rgba(174,47,52,0.2); }
  .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
  .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .product-image { aspect-ratio: 1 / 1; object-fit: cover; width: 100%; height: auto; border-radius: 1rem; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background-color: #10b981; color: white; padding: 12px 24px; border-radius: 9999px; font-weight: 600; z-index: 1000; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; white-space: nowrap; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
  @media (max-width: 640px) { .toast { white-space: normal; text-align: center; width: 90%; font-size: 14px; } .product-card { border-radius: 1rem; } .product-card .p-4 { padding: 0.75rem; } }
</style>
</head>
<body class="bg-surface text-on-surface">

<!-- 🌍 COMPONENTES GLOBAIS -->
<div id="global-header"></div>
<div id="global-sidebar"></div>
<script src="/src/components/header.js"></script>
<script src="/src/components/sidebar.js"></script>

<main class="pt-24 pb-32 px-4 max-w-7xl mx-auto">
  <h1 class="text-3xl font-bold mb-2 cardapio-title">Cardápio</h1>
  <p class="text-on-surface-variant mb-6 cardapio-subtitle">Escolha seus favoritos e monte seu pedido com delícias fresquinhas.</p>

  <div class="mb-8 overflow-x-auto no-scrollbar">
    <div id="category-filters" class="flex gap-2 pb-2">
      <button data-category="all" class="category-filter bg-primary text-white px-4 py-2 rounded-full text-sm font-semibold">Todos</button>
    </div>
  </div>

  <div id="products-list" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
    <div class="text-center py-8 col-span-full">Carregando produtos...</div>
  </div>
</main>

<footer class="bg-[#fff0ef] py-8 text-center text-sm text-on-surface-variant">
  <p>© 2026 I Love Delicitas. Todos os direitos reservados.</p>
  <p class="mt-2">CNPJ: 61.316.392/0001-97</p>
  <p id="footer-preparation-time" class="mt-2"></p>
</footer>

<script>
  // ================== CONFIGURAÇÃO SUPABASE ==================
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const SETTINGS_BASE_URL = 'https://ilove-delicitas-admin.onrender.com/api/settings';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let categories = [], allProducts = [], currentCategory = 'all';

  function showToast(msg) { 
    const t = document.querySelector('.toast') || (()=>{const d=document.createElement('div');d.className='toast';document.body.appendChild(d);return d;})(); 
    t.textContent=msg; t.style.opacity='1'; 
    setTimeout(()=>t.style.opacity='0',2000); 
  }

  function updateCartCount() { 
    const cart = JSON.parse(localStorage.getItem('cart')||'[]'); 
    const el = document.getElementById('cart-count'); 
    if (el) el.innerText = cart.reduce((s,i)=>s+(i.quantity||1),0); 
  }
  updateCartCount();

  async function loadCategories() {
    const { data } = await supabaseClient.from('categories').select('*').order('name');
    categories = data || [];
    const container = document.getElementById('category-filters');
    container.innerHTML = '<button data-category="all" class="category-filter bg-primary text-white px-4 py-2 rounded-full text-sm font-semibold">Todos</button>';
    categories.forEach(cat => { 
      const btn = document.createElement('button'); 
      btn.innerText = cat.name; 
      btn.dataset.category = cat.id; 
      btn.className = 'category-filter bg-surface-container-low text-on-surface-variant px-4 py-2 rounded-full text-sm font-semibold hover:bg-primary-container transition'; 
      container.appendChild(btn); 
    });
    document.querySelectorAll('.category-filter').forEach(btn => btn.addEventListener('click', () => {
      currentCategory = btn.dataset.category;
      document.querySelectorAll('.category-filter').forEach(b => { 
        if (b.dataset.category === currentCategory) { 
          b.classList.add('bg-primary','text-white'); 
          b.classList.remove('bg-surface-container-low','text-on-surface-variant'); 
        } else { 
          b.classList.remove('bg-primary','text-white'); 
          b.classList.add('bg-surface-container-low','text-on-surface-variant'); 
        } 
      });
      renderProducts();
    }));
  }

  async function loadProducts() {
    const { data } = await supabaseClient.from('products').select('*').eq('active', true).gt('stock', 0).order('name');
    allProducts = data || [];
    renderProducts();
  }

  function renderProducts() {
    const container = document.getElementById('products-list');
    let filtered = allProducts;
    if (currentCategory !== 'all') filtered = allProducts.filter(p => p.category_id === currentCategory);
    if (!filtered.length) { 
      container.innerHTML = '<div class="text-center py-8 col-span-full">Nenhum produto encontrado.</div>'; 
      return; 
    }
    container.innerHTML = filtered.map(p => `
      <div class="bg-white rounded-2xl overflow-hidden shadow-sm product-card cursor-pointer group">
        <div class="relative overflow-hidden">
          <img class="w-full aspect-square object-cover transition-transform duration-500 group-hover:scale-110" src="${p.image_url || 'https://placehold.co/300x300/fff0ef/ae2f34?text=🍰'}" alt="${escapeHtml(p.name)}" loading="lazy">
          <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
          ${(p.stock||0) < 5 ? '<span class="absolute top-2 left-2 bg-primary text-white text-xs px-2 py-1 rounded-full font-bold animate-pulse">⚡ Últimas!</span>' : ''}
          <button class="absolute bottom-2 right-2 bg-primary text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg opacity-0 group-hover:opacity-100 transition-all hover:scale-110" onclick="event.stopPropagation();addToCart('${p.id}','${escapeHtml(p.name)}',${p.price_cents},'${p.image_url||''}')"><span class="material-symbols-outlined text-sm">add</span></button>
        </div>
        <div class="p-4">
          <h3 class="font-headline font-bold text-base mb-1 line-clamp-1">${escapeHtml(p.name)}</h3>
          <p class="text-xs text-on-surface-variant mb-3 line-clamp-2 min-h-[2rem]">${escapeHtml(p.description||'Delícia artesanal')}</p>
          <div class="flex justify-between items-end gap-2">
            <span class="text-lg font-black text-primary">R$ ${((p.price_cents||0)/100).toFixed(2).replace('.',',')}</span>
            <button class="flex items-center gap-1 bg-primary text-white px-3 py-1.5 rounded-full text-xs font-bold hover:scale-105 transition" onclick="addToCart('${p.id}','${escapeHtml(p.name)}',${p.price_cents},'${p.image_url||''}')"><span class="material-symbols-outlined text-xs">add</span> Adicionar</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function addToCart(id, name, priceCents, img) {
    let cart = JSON.parse(localStorage.getItem('cart')||'[]');
    const ex = cart.find(i=>i.id===id); 
    if (ex) ex.quantity++; 
    else cart.push({id, name, price_cents: priceCents, quantity:1, image_url: img});
    localStorage.setItem('cart', JSON.stringify(cart)); 
    updateCartCount(); 
    showToast(`✅ ${name} adicionado!`);
  }

  function escapeHtml(s) { 
    if (!s) return ''; 
    return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); 
  }

  async function loadPreparationTime() {
    try {
      const res = await fetch(`${SETTINGS_BASE_URL}/preparation-time`);
      const data = await res.json();
      let value = data?.preparationTime || data?.data?.preparationTime;
      if (typeof value === 'number') value = `${value} min`;
      else if (typeof value === 'string') value = value;
      else value = '30-45 min';
      document.getElementById('footer-preparation-time').innerText = `⏱️ Tempo médio de preparo: ${value}`;
    } catch { 
      document.getElementById('footer-preparation-time').innerText = '⏱️ Tempo médio de preparo: 30-45 min'; 
    }
  }
  loadPreparationTime();

  // Inicialização
  document.addEventListener('DOMContentLoaded', () => {
    loadCategories();
    loadProducts();
  });
</script>
</body>
</html>

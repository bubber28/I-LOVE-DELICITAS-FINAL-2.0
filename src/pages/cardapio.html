<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cardápio - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ae2f34",
          "primary-container": "#ff6b6b",
          "secondary": "#006a65",
          "surface": "#fff8f7",
          "on-surface": "#251818",
          "on-surface-variant": "#584140",
          "surface-container-low": "#fff0ef",
          "error": "#ba1a1a"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background-color: #fff8f7; min-height: 100dvh; }
  .product-card {
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
  }
  .product-image {
    aspect-ratio: 1 / 1;
    object-fit: cover;
    width: 100%;
    height: auto;
    border-radius: 1rem;
  }
</style>
</head>
<body class="bg-surface text-on-surface">

<header class="fixed top-0 w-full z-50 bg-[#fff8f7]/70 backdrop-blur-xl shadow-sm">
  <div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
    <a href="/"><img class="h-12" src="https://lh3.googleusercontent.com/aida/ADBb0ug9pEscIuL2DlpA17jlxEDClMUUl57IcXfA7OVPOBmhp5sAf7PwxKnpbI1tY9CcPsm_Q_lnh_6nc7K9s-Ufu8Vl1c-OjwARYp7iAHfnZcmG0DBwt67Xn07BOzLg_PKmoimX0VhBx_7sWyf5BR1B5okOzwW7leBDUVxtd-hraOOegasbSbL6SufvbUq093ykJtCjJbgzAXz6oOZhTDNVOwf2jgT_67YQ89bs9nwJk_awO3yEeaN9p4lZbmtoAwd21a5JeopnxomDwkc"/></a>
    <a href="/carrinho" class="relative p-2"><span class="material-symbols-outlined text-primary">shopping_bag</span><span id="cart-count" class="absolute -top-1 -right-1 bg-primary text-white text-xs w-5 h-5 rounded-full">0</span></a>
  </div>
</header>

<main class="pt-24 pb-32 px-4 max-w-7xl mx-auto">
  <h1 class="text-3xl font-bold mb-6">Cardápio</h1>

  <!-- Filtro de categorias -->
  <div class="mb-8 overflow-x-auto no-scrollbar">
    <div id="category-filters" class="flex gap-2 pb-2">
      <button data-category="all" class="category-filter bg-primary text-white px-4 py-2 rounded-full text-sm font-semibold">Todos</button>
      <!-- as categorias serão inseridas aqui -->
    </div>
  </div>

  <!-- Lista de produtos -->
  <div id="products-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
    <div class="text-center py-8 col-span-full">Carregando produtos...</div>
  </div>
</main>

<footer class="bg-[#fff0ef] py-12 text-center">
  <p>© 2025 I Love Delicitas. Doce momento.</p>
</footer>

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let categories = [];
  let allProducts = [];
  let currentCategory = 'all';

  function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const totalItems = cart.reduce((sum, i) => sum + (i.quantity || 1), 0);
    document.getElementById('cart-count').innerText = totalItems;
  }
  updateCartCount();

  async function loadCategories() {
    const { data } = await supabaseClient.from('categories').select('*').order('name');
    categories = data || [];
    const container = document.getElementById('category-filters');
    // Limpa os botões existentes, mantendo apenas o "Todos"
    container.innerHTML = '<button data-category="all" class="category-filter bg-primary text-white px-4 py-2 rounded-full text-sm font-semibold">Todos</button>';
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.innerText = cat.name;
      btn.dataset.category = cat.id;
      btn.className = 'category-filter bg-surface-container-low text-on-surface-variant px-4 py-2 rounded-full text-sm font-semibold hover:bg-primary-container transition';
      container.appendChild(btn);
    });
    // Adiciona eventos após criação
    document.querySelectorAll('.category-filter').forEach(btn => {
      btn.addEventListener('click', () => {
        currentCategory = btn.dataset.category;
        // Atualiza estilo dos botões
        document.querySelectorAll('.category-filter').forEach(b => {
          if (b.dataset.category === currentCategory) {
            b.classList.add('bg-primary', 'text-white');
            b.classList.remove('bg-surface-container-low', 'text-on-surface-variant');
          } else {
            b.classList.remove('bg-primary', 'text-white');
            b.classList.add('bg-surface-container-low', 'text-on-surface-variant');
          }
        });
        renderProducts();
      });
    });
  }

  async function loadProducts() {
    const { data } = await supabaseClient
      .from('products')
      .select('*')
      .eq('active', true)
      .gt('stock', 0)
      .order('name');
    allProducts = data || [];
    renderProducts();
  }

  function renderProducts() {
    const container = document.getElementById('products-list');
    let filtered = allProducts;
    if (currentCategory !== 'all') {
      filtered = allProducts.filter(p => p.category_id === currentCategory);
    }
    if (filtered.length === 0) {
      container.innerHTML = '<div class="text-center py-8 col-span-full">Nenhum produto encontrado nesta categoria.</div>';
      return;
    }
    container.innerHTML = filtered.map(prod => `
      <div class="bg-white rounded-2xl p-5 shadow-sm product-card">
        <div class="mb-4 overflow-hidden rounded-xl">
          <img class="product-image" src="${prod.image_url || 'https://placehold.co/300x300?text=Delícia'}" alt="${escapeHtml(prod.name)}">
        </div>
        <h3 class="font-headline font-bold text-xl mb-1">${escapeHtml(prod.name)}</h3>
        <p class="text-sm text-on-surface-variant mb-3 line-clamp-2">${escapeHtml(prod.description || 'Delícia artesanal')}</p>
        <div class="flex justify-between items-center">
          <span class="text-2xl font-black text-on-surface">R$ ${(prod.price_cents / 100).toFixed(2).replace('.', ',')}</span>
          <button onclick="addToCart('${prod.id}', '${escapeHtml(prod.name)}', ${prod.price_cents}, '${prod.image_url || ''}')" class="bg-secondary text-white p-3 rounded-full hover:scale-110 transition">
            <span class="material-symbols-outlined">add_shopping_cart</span>
          </button>
        </div>
      </div>
    `).join('');
  }

  function addToCart(id, name, priceCents, imageUrl) {
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const existing = cart.find(i => i.id === id);
    if (existing) existing.quantity = (existing.quantity || 1) + 1;
    else cart.push({ id, name, price_cents: priceCents, quantity: 1, image_url: imageUrl });
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    alert('Produto adicionado ao carrinho!');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  }

  loadCategories();
  loadProducts();
</script>
</body>
</html>

<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Esqueci minha senha - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ae2f34",
          "primary-container": "#ff6b6b",
          "secondary": "#006a65",
          "surface": "#fff8f7",
          "on-surface": "#251818",
          "on-surface-variant": "#584140",
          "surface-container-low": "#fff0ef",
          "error": "#ba1a1a"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background-color: #fff8f7; }
  .input-field { width: 100%; padding: 0.75rem; border-radius: 1rem; border: 1px solid #e0bfbd; background: white; transition: all 0.2s; }
  .input-field:focus { outline: none; border-color: #ae2f34; box-shadow: 0 0 0 2px rgba(174,47,52,0.2); }
</style>
</head>
<body class="bg-surface">

<header class="fixed top-0 w-full z-50 bg-[#fff8f7]/70 backdrop-blur-xl shadow-sm">
  <div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
    <a href="/"><img class="h-12" src="https://bizrnjpmsyxdsflgpxcl.supabase.co/storage/v1/object/public/logos/ILOVE%20DELICITAS%20PNG%20OK.png"/></a>
    <a href="/carrinho" class="relative p-2"><span class="material-symbols-outlined text-primary">shopping_bag</span><span id="cart-count" class="absolute -top-1 -right-1 bg-primary text-white text-xs w-5 h-5 rounded-full">0</span></a>
  </div>
</header>

<main class="pt-24 pb-32 px-4 max-w-md mx-auto">
  <div class="bg-white rounded-2xl p-8 shadow-sm">
    <h1 class="text-2xl font-bold text-primary text-center mb-6">Redefinir senha</h1>
    <form id="reset-form" class="space-y-4">
      <div>
        <label class="block font-semibold mb-1">E-mail cadastrado</label>
        <input type="email" id="email" class="input-field" required>
      </div>
      <button type="submit" class="w-full bg-primary text-white py-3 rounded-full font-bold">Enviar e-mail de recuperação</button>
    </form>
    <div class="mt-4 text-center text-sm">
      <a href="/login" class="text-primary underline">Voltar para o login</a>
    </div>
    <p id="error-message" class="text-error text-sm text-center mt-3 hidden"></p>
    <p id="success-message" class="text-secondary text-sm text-center mt-3 hidden"></p>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const totalItems = cart.reduce((sum, i) => sum + (i.quantity || 1), 0);
    document.getElementById('cart-count').innerText = totalItems;
  }
  updateCartCount();

  const form = document.getElementById('reset-form');
  const errorEl = document.getElementById('error-message');
  const successEl = document.getElementById('success-message');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.classList.add('hidden');
    successEl.classList.add('hidden');

    const email = document.getElementById('email').value.trim();
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: `${window.location.origin}/reset-password`
    });

    if (error) {
      errorEl.textContent = error.message;
      errorEl.classList.remove('hidden');
    } else {
      successEl.textContent = 'Enviamos um e‑mail com instruções para redefinir sua senha.';
      successEl.classList.remove('hidden');
      setTimeout(() => {
        window.location.href = '/login';
      }, 5000);
    }
  });
</script>
</body>
</html>

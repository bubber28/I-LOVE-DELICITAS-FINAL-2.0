<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Redefinir senha - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ae2f34",
          "primary-container": "#ff6b6b",
          "secondary": "#006a65",
          "surface": "#fff8f7",
          "on-surface": "#251818",
          "on-surface-variant": "#584140",
          "surface-container-low": "#fff0ef",
          "error": "#ba1a1a"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background-color: #fff8f7; }
  .input-field { width: 100%; padding: 0.75rem; border-radius: 1rem; border: 1px solid #e0bfbd; background: white; transition: all 0.2s; }
  .input-field:focus { outline: none; border-color: #ae2f34; box-shadow: 0 0 0 2px rgba(174,47,52,0.2); }
</style>
</head>
<body>

<header class="fixed top-0 w-full z-50 bg-[#fff8f7]/70 backdrop-blur-xl shadow-sm">
  <div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
    <a href="/"><img class="h-12" src="https://bizrnjpmsyxdsflgpxcl.supabase.co/storage/v1/object/public/logos/ILOVE%20DELICITAS%20PNG%20OK.png"/></a>
    <a href="/carrinho" class="relative p-2"><span class="material-symbols-outlined text-primary">shopping_bag</span><span id="cart-count" class="absolute -top-1 -right-1 bg-primary text-white text-xs w-5 h-5 rounded-full flex items-center justify-center leading-none font-semibold">0</span></a>
  </div>
</header>

<main class="pt-24 pb-32 px-4 max-w-md mx-auto">
  <div class="bg-white rounded-2xl p-8 shadow-sm">
    <h1 class="text-2xl font-bold text-primary text-center mb-6">Nova senha</h1>
    <p id="token-status" class="text-sm text-center text-on-surface-variant mb-4 hidden"></p>
    <form id="new-password-form" class="space-y-4">
      <div><label class="block font-semibold mb-1">Nova senha</label><input type="password" id="password" class="input-field" required></div>
      <div><label class="block font-semibold mb-1">Confirmar senha</label><input type="password" id="confirm-password" class="input-field" required></div>
      <button type="submit" class="w-full bg-primary text-white py-3 rounded-full font-bold">Alterar senha</button>
    </form>
    <p id="error-message" class="text-error text-sm text-center mt-3 hidden"></p>
    <p id="success-message" class="text-secondary text-sm text-center mt-3 hidden"></p>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const totalItems = cart.reduce((sum, i) => sum + (i.quantity || 1), 0);
    document.getElementById('cart-count').innerText = totalItems;
  }
  updateCartCount();

  const form = document.getElementById('new-password-form');
  const errorEl = document.getElementById('error-message');
  const successEl = document.getElementById('success-message');
  const tokenStatusEl = document.getElementById('token-status');
  let isSubmitting = false;

  function readRecoveryParams() {
    const url = new URL(window.location.href);
    const hashParams = new URLSearchParams(url.hash.replace(/^#/, ''));
    return {
      token: url.searchParams.get('token') || url.searchParams.get('access_token') || hashParams.get('access_token') || '',
      tokenHash: url.searchParams.get('token_hash') || url.searchParams.get('tokenHash') || '',
      refreshToken: url.searchParams.get('refresh_token') || hashParams.get('refresh_token') || '',
      type: url.searchParams.get('type') || hashParams.get('type') || 'recovery',
      email: url.searchParams.get('email') || ''
    };
  }

  function showTokenStatus(message, isError = false) {
    tokenStatusEl.textContent = message;
    tokenStatusEl.classList.remove('hidden');
    tokenStatusEl.classList.toggle('text-error', isError);
    tokenStatusEl.classList.toggle('text-on-surface-variant', !isError);
  }

  function mapResetError(message) {
    const normalized = String(message || '').toLowerCase();
    if (normalized.includes('expired') || normalized.includes('invalid') || normalized.includes('otp')) {
      return 'O link de recuperacao expirou ou nao e mais valido. Solicite um novo link.';
    }
    if (normalized.includes('password')) {
      return 'Nao foi possivel atualizar a senha com os dados informados.';
    }
    return 'Nao foi possivel redefinir a senha agora. Solicite um novo link e tente novamente.';
  }

  async function verifyRecoveryToken(params) {
    const verifyUrl = `${SUPABASE_URL}/auth/v1/verify`;
    const headers = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY
    };
    const attempts = [];

    if (params.tokenHash) {
      attempts.push({ token_hash: params.tokenHash, type: params.type || 'recovery' });
    }
    if (params.token) {
      attempts.push({ token_hash: params.token, type: params.type || 'recovery' });
      attempts.push({ token: params.token, type: params.type || 'recovery' });
      if (params.email) {
        attempts.push({ email: params.email, token: params.token, type: params.type || 'recovery' });
      }
    }

    let lastError = null;
    for (const payload of attempts) {
      const response = await fetch(verifyUrl, {
        method: 'POST',
        headers,
        body: JSON.stringify(payload)
      });
      const data = await response.json().catch(() => null);
      if (response.ok) return data;
      lastError = data?.msg || data?.message || response.statusText;
    }

    throw new Error(lastError || 'invalid_or_expired_token');
  }

  async function updatePasswordWithAccessToken(accessToken, password) {
    const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${accessToken}`
      },
      body: JSON.stringify({ password })
    });
    const data = await response.json().catch(() => null);
    if (!response.ok) {
      throw new Error(data?.msg || data?.message || 'password_update_failed');
    }
    return data;
  }

  function syncRecoveryState() {
    const params = readRecoveryParams();
    const hasToken = Boolean(params.token || params.tokenHash);
    if (hasToken) {
      showTokenStatus('Link de recuperacao detectado. Defina sua nova senha para continuar.');
      form.querySelector('button[type="submit"]').disabled = false;
      return params;
    }
    showTokenStatus('Link de recuperacao ausente ou invalido. Solicite um novo link em /esqueci-senha.', true);
    form.querySelector('button[type="submit"]').disabled = true;
    return params;
  }

  syncRecoveryState();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (isSubmitting) return;
    errorEl.classList.add('hidden');
    successEl.classList.add('hidden');

    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;
    const params = readRecoveryParams();

    if (!params.token && !params.tokenHash) {
      errorEl.textContent = 'O link de recuperacao e invalido. Solicite um novo link para continuar.';
      errorEl.classList.remove('hidden');
      return;
    }

    if (password.length < 6) {
      errorEl.textContent = 'A nova senha deve ter pelo menos 6 caracteres.';
      errorEl.classList.remove('hidden');
      return;
    }

    if (password !== confirm) {
      errorEl.textContent = 'As senhas nao coincidem.';
      errorEl.classList.remove('hidden');
      return;
    }

    isSubmitting = true;
    const submitBtn = form.querySelector('button[type="submit"]');
    const originalText = submitBtn.textContent;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Atualizando...';

    try {
      let accessToken = params.token;
      if (!accessToken || params.tokenHash) {
        const verification = await verifyRecoveryToken(params);
        accessToken = verification?.access_token || verification?.session?.access_token || accessToken;
      }
      if (!accessToken) {
        throw new Error('missing_access_token');
      }

      await updatePasswordWithAccessToken(accessToken, password);
      successEl.textContent = 'Senha alterada com sucesso. Voce sera redirecionado para o login.';
      successEl.classList.remove('hidden');
      setTimeout(() => { window.location.href = '/login'; }, 3000);
    } catch (err) {
      errorEl.textContent = mapResetError(err?.message);
      errorEl.classList.remove('hidden');
      syncRecoveryState();
    } finally {
      submitBtn.textContent = originalText;
      isSubmitting = false;
      syncRecoveryState();
    }
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Pedidos - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          primary: '#ae2f34',
          secondary: '#006a65',
          surface: '#fff8f7',
          onsurface: '#251818'
        },
        fontFamily: {
          headline: ['Plus Jakarta Sans'],
          body: ['Be Vietnam Pro']
        }
      }
    }
  };
</script>
<style>
  body {
    background: radial-gradient(circle at top left, #fff3ee 0%, #fff8f7 50%, #fffbf9 100%);
    min-height: 100vh;
  }

  .status-pill {
    border: 1px solid #ead8d5;
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 700;
    color: #7c5f5e;
    background: #fff;
  }

  .status-pill.done {
    color: #0f5132;
    border-color: #a7f3d0;
    background: #ecfdf5;
  }

  .status-pill.current-received {
    color: #065f46;
    border-color: #6ee7b7;
    background: #d1fae5;
  }

  .status-pill.current-preparing {
    color: #1d4ed8;
    border-color: #93c5fd;
    background: #dbeafe;
  }

  .status-pill.current-ready {
    color: #92400e;
    border-color: #fcd34d;
    background: #fef3c7;
  }

  .status-pill.current-delivery {
    color: #065f46;
    border-color: #6ee7b7;
    background: #d1fae5;
  }

  .status-pill.current-delivered {
    color: #14532d;
    border-color: #86efac;
    background: #dcfce7;
  }

  .status-pill.current-canceled {
    color: #991b1b;
    border-color: #fca5a5;
    background: #fee2e2;
  }

  .tab-btn.active {
    background: #ae2f34;
    color: #fff;
    border-color: #ae2f34;
  }

  .delivery-fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    background: #10b981;
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 14px 18px;
    font-weight: 700;
    box-shadow: 0 18px 30px rgba(16, 185, 129, 0.3);
  }

  @media (max-width: 768px) {
    button {
      width: 100% !important;
      font-size: 16px;
    }
  }
</style>
</head>
<body class="text-onsurface font-body">
  <header class="sticky top-0 z-20 backdrop-blur-md bg-white/80 border-b border-[#f0d9d2]">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center gap-3">
      <h1 class="text-xl md:text-2xl font-headline font-extrabold text-primary">Painel Admin Pedidos</h1>
      <a href="/" class="text-sm font-semibold text-primary hover:underline">Voltar para loja</a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6 pb-28">
    <section class="bg-white border border-[#f0d9d2] rounded-2xl p-4 md:p-5 mb-6">
      <div class="flex flex-wrap gap-2" id="tabs"></div>
    </section>

    <section id="orders-container" class="space-y-4">
      <div class="bg-white border border-[#f0d9d2] rounded-2xl p-6 text-center">Carregando pedidos...</div>
    </section>
  </main>

  <button id="delivery-fab" class="delivery-fab hidden">✓ Entregue</button>

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const BACKEND_BASE_URL = null; // 🔒 CORREÇÃO #6: URL não configurada - deixar null
  const ORDER_STATUS_FLOW = ['received', 'preparing', 'delivery', 'delivered']; // 🔒 CORREÇÃO #7: Padronizado com acompanhamento (sem 'ready')
  const STATUS_LABELS = {
    received: 'Recebido',
    preparing: 'Preparando',
    delivery: 'Entrega',
    delivered: 'Concluido',
    canceled: 'Cancelado'
  };

  const TAB_LIST = [
    { value: 'all', label: 'Todos' },
    { value: 'received', label: 'Recebidos' },
    { value: 'preparing', label: 'Preparando' },
    { value: 'delivery', label: 'Entrega' },
    { value: 'delivered', label: 'Entregues' }
  ];

  let currentTab = 'all';
  let allOrders = [];
  let deliveryFabOrderId = null;
  let socket = null;

  const newOrderSound = new Howl({
    src: ['/alert.mp3.mp3'],
    volume: 1
  });

  function setupSocketIO() {
    if (!BACKEND_BASE_URL) {
      console.warn('⚠️ BACKEND_BASE_URL não configurada - Socket.io desativado');
      return null;
    }
    if (socket) return socket;

    socket = io(BACKEND_BASE_URL, {
      transports: ['websocket', 'polling'],
      reconnection: true
    });

    socket.on('connect', () => {
      console.log('✅ Socket conectado:', socket.id);
    });

    socket.on('novoPedido', async () => {
      await loadOrders();
      newOrderSound.play();
    });

    socket.on('disconnect', () => {
      console.log('⚠️ Socket desconectado');
    });

    return socket;
  }

  function renderTabs() {
    const tabsEl = document.getElementById('tabs');
    tabsEl.innerHTML = TAB_LIST.map((tab) => `
      <button
        type="button"
        class="tab-btn px-4 py-2 rounded-full border border-[#e9d3cd] text-sm font-semibold transition ${tab.value === currentTab ? 'active' : ''}"
        data-tab="${tab.value}"
      >${tab.label}</button>
    `).join('');

    tabsEl.querySelectorAll('.tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        currentTab = btn.dataset.tab;
        renderTabs();
        renderOrders();
      });
    });
  }

  async function loadOrders() {
    const { data, error } = await supabaseClient
      .from('orders')
      .select('id, customer_name, customer_phone, total_cents, status, created_at, delivery_type')
      .order('created_at', { ascending: false });

    if (error) {
      console.error(error);
      document.getElementById('orders-container').innerHTML = '<div class="bg-white border border-red-200 rounded-2xl p-6 text-center text-red-600">Erro ao carregar pedidos.</div>';
      return;
    }

    allOrders = data || [];
    renderOrders();
  }

  function getStatusAction(order) {
    if (order.status === 'received') {
      return { label: 'Aceitar', emoji: '🟢', actionType: 'next-status', nextStatus: 'preparing', btnClass: 'bg-emerald-600 text-white' };
    }

    if (order.status === 'preparing') {
      if (order.delivery_type === 'delivery') {
        return { label: 'Enviar link motoboy', emoji: '🔗', actionType: 'send-tracking', btnClass: 'bg-amber-500 text-black' };
      }
      return { label: 'Finalizar retirada', emoji: '🟡', actionType: 'next-status', nextStatus: 'delivered', btnClass: 'bg-amber-500 text-black' };
    }

    return null;
  }

  async function sendTrackingAndStartDelivery(orderId) {
    const plataformaInput = (prompt('Plataforma do motoboy (uber ou 99):') || '').trim().toLowerCase();
    if (!plataformaInput) return;

    const plataforma = plataformaInput === 'uber' ? 'uber' : (plataformaInput === '99' ? '99' : null);
    if (!plataforma) {
      alert('Plataforma inválida. Digite "uber" ou "99".');
      return;
    }

    const trackingUrl = (prompt('Cole o link de rastreio da corrida:') || '').trim();
    if (!trackingUrl) return;

    if (!/^https?:\/\//i.test(trackingUrl)) {
      alert('Link inválido. O rastreio deve começar com http:// ou https://.');
      return;
    }

    const { error } = await supabaseClient
      .from('orders')
      .update({
        status: 'delivery',
        tracking_url: trackingUrl,
        motoboy_plataforma: plataforma
      })
      .eq('id', orderId);

    if (error) {
      console.error(error);
      alert('Erro ao enviar link de rastreio.');
      return;
    }

    await loadOrders();
  }

  function formatTypeBadge(deliveryType) {
    const badge = document.createElement('span');
    badge.className = 'px-3 py-1 rounded-full text-xs font-bold';
    if (deliveryType === 'pickup') {
      badge.classList.add('bg-slate-100', 'text-slate-700');
      badge.textContent = '🏠 pickup';
      return badge;
    }

    badge.classList.add('bg-emerald-100', 'text-emerald-700');
    badge.textContent = '🛵 delivery';
    return badge;
  }

  function renderFlow(status) {
    const orderIndex = ORDER_STATUS_FLOW.indexOf(status);

    const wrapper = document.createElement('div');
    wrapper.className = 'flex flex-wrap gap-2 mt-3';

    ['received', 'preparing', 'delivery', 'delivered'].forEach((step) => {
      const pill = document.createElement('span');
      const stepIndex = ORDER_STATUS_FLOW.indexOf(step);
      const isDone = orderIndex > stepIndex;
      const isCurrent = status === step;
      pill.className = 'status-pill';
      if (isDone) pill.classList.add('done');
      else if (isCurrent) pill.classList.add(`current-${step}`);
      pill.textContent = STATUS_LABELS[step];
      wrapper.appendChild(pill);
    });

    if (status === 'canceled') {
      const canceledPill = document.createElement('span');
      canceledPill.className = 'status-pill current-canceled';
      canceledPill.textContent = 'Cancelado';
      wrapper.appendChild(canceledPill);
    }

    return wrapper;
  }

  function getStatusBadge(status) {
    const map = {
      received: 'bg-emerald-100 text-emerald-700',
      preparing: 'bg-blue-100 text-blue-700',
      ready: 'bg-amber-100 text-amber-700',
      delivery: 'bg-emerald-100 text-emerald-700',
      delivered: 'bg-green-100 text-green-700',
      canceled: 'bg-red-100 text-red-700'
    };

    const badge = document.createElement('span');
    badge.className = `px-3 py-1 rounded-full text-xs font-bold ${map[status] || 'bg-slate-100 text-slate-700'}`;
    badge.textContent = STATUS_LABELS[status] || status;
    return badge;
  }

  function createInfoItem(label, value) {
    const paragraph = document.createElement('p');
    const strong = document.createElement('strong');
    strong.textContent = `${label}:`;
    paragraph.appendChild(strong);
    paragraph.appendChild(document.createTextNode(` ${value}`));
    return paragraph;
  }

  function createOrderButton({ className, text, onClick }) {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = className;
    button.textContent = text;
    button.addEventListener('click', onClick);
    return button;
  }

  function createOrderCard(order, filteredOrders) {
    const article = document.createElement('article');
    article.className = 'bg-white border border-[#f0d9d2] rounded-2xl p-4 md:p-5 shadow-sm';

    const header = document.createElement('div');
    header.className = 'flex flex-wrap items-center justify-between gap-2';

    const orderMeta = document.createElement('div');
    const orderTitle = document.createElement('p');
    orderTitle.className = 'font-mono font-bold';
    orderTitle.textContent = `Pedido #${order.id.slice(0, 8)}`;
    const orderDate = document.createElement('p');
    orderDate.className = 'text-xs text-slate-500';
    orderDate.textContent = new Date(order.created_at).toLocaleString('pt-BR');
    orderMeta.append(orderTitle, orderDate);

    const badges = document.createElement('div');
    badges.className = 'flex items-center gap-2';
    badges.append(formatTypeBadge(order.delivery_type), getStatusBadge(order.status));

    header.append(orderMeta, badges);
    article.appendChild(header);
    article.appendChild(renderFlow(order.status));

    const infoGrid = document.createElement('div');
    infoGrid.className = 'mt-4 grid md:grid-cols-3 gap-2 text-sm';
    const total = `R$ ${((order.total_cents || 0) / 100).toFixed(2).replace('.', ',')}`;
    infoGrid.append(
      createInfoItem('Cliente', order.customer_name || 'Nao informado'),
      createInfoItem('Telefone', order.customer_phone || 'Nao informado'),
      createInfoItem('Total', total)
    );
    article.appendChild(infoGrid);

    const actions = document.createElement('div');
    actions.className = 'mt-4 grid md:grid-cols-3 gap-2';
    const action = getStatusAction(order);

    if (action) {
      actions.appendChild(createOrderButton({
        className: `px-4 py-2 rounded-xl font-semibold ${action.btnClass}`,
        text: `${action.emoji} ${action.label}`,
        onClick: async () => {
          if (action.actionType === 'send-tracking') {
            await sendTrackingAndStartDelivery(order.id);
            return;
          }
          await updateOrderStatus(order.id, action.nextStatus);
        }
      }));
    }

    if (order.status === 'delivery') {
      actions.appendChild(createOrderButton({
        className: 'px-4 py-2 rounded-xl font-semibold bg-emerald-700 text-white',
        text: '✓ Usar FAB neste pedido',
        onClick: () => {
          deliveryFabOrderId = order.id;
          syncDeliveryFab(filteredOrders);
        }
      }));
    }

    if (order.status !== 'delivered' && order.status !== 'canceled') {
      actions.appendChild(createOrderButton({
        className: 'px-4 py-2 rounded-xl font-semibold bg-red-600 text-white',
        text: '❌ Cancelar',
        onClick: async () => {
          await updateOrderStatus(order.id, 'canceled');
        }
      }));
    }

    if (actions.childElementCount > 0) {
      article.appendChild(actions);
    }

    return article;
  }

  function getFilteredOrders() {
    if (currentTab === 'all') return allOrders;
    return allOrders.filter((order) => order.status === currentTab);
  }

  function syncDeliveryFab(filteredOrders) {
    const fab = document.getElementById('delivery-fab');
    const deliveryOrders = filteredOrders.filter((order) => order.status === 'delivery');

    if (deliveryFabOrderId && !deliveryOrders.find((order) => order.id === deliveryFabOrderId)) {
      deliveryFabOrderId = null;
    }

    if (!deliveryFabOrderId && deliveryOrders.length > 0) {
      deliveryFabOrderId = deliveryOrders[0].id;
    }

    if (!deliveryFabOrderId) {
      fab.classList.add('hidden');
      return;
    }

    const currentOrder = deliveryOrders.find((order) => order.id === deliveryFabOrderId);
    if (!currentOrder) {
      fab.classList.add('hidden');
      return;
    }

    fab.textContent = `✓ Entregue #${currentOrder.id.slice(0, 8)}`;
    fab.classList.remove('hidden');
  }

  function renderOrders() {
    const container = document.getElementById('orders-container');
    const filteredOrders = getFilteredOrders();

    syncDeliveryFab(filteredOrders);

    if (filteredOrders.length === 0) {
      container.innerHTML = '<div class="bg-white border border-[#f0d9d2] rounded-2xl p-6 text-center">Nenhum pedido nesta aba.</div>';
      return;
    }

    container.textContent = '';
    const fragment = document.createDocumentFragment();
    filteredOrders.forEach((order) => {
      fragment.appendChild(createOrderCard(order, filteredOrders));
    });
    container.appendChild(fragment);
  }

  async function updateOrderStatus(orderId, nextStatus) {
    const { error } = await supabaseClient
      .from('orders')
      .update({ status: nextStatus })
      .eq('id', orderId);

    if (error) {
      console.error(error);
      alert('Erro ao atualizar status.');
      return;
    }

    await loadOrders();
  }

  document.getElementById('delivery-fab').addEventListener('click', async () => {
    if (!deliveryFabOrderId) return;
    await updateOrderStatus(deliveryFabOrderId, 'delivered');
  });

  async function init() {
    renderTabs();
    setupSocketIO();
    await loadOrders();
  }

  init();
</script>
</body>
</html>

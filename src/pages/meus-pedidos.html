<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Meus Pedidos - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ae2f34",
          "primary-container": "#ff6b6b",
          "secondary": "#006a65",
          "surface": "#fff8f7",
          "on-surface": "#251818",
          "on-surface-variant": "#584140",
          "surface-container-low": "#fff0ef",
          "error": "#ba1a1a"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background-color: #fff8f7; }
  .order-card {
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .order-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  }
</style>
</head>
<body class="bg-surface">

<header class="fixed top-0 w-full z-50 bg-[#fff8f7]/70 backdrop-blur-xl shadow-sm">
  <div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
    <a href="/"><img class="h-12" src="https://bizrnjpmsyxdsflgpxcl.supabase.co/storage/v1/object/public/logos/ILOVE%20DELICITAS%20PNG%20OK.png"/></a>
    <div class="flex items-center gap-4">
      <a href="/carrinho" class="relative p-2"><span class="material-symbols-outlined text-primary">shopping_bag</span><span id="cart-count" class="absolute -top-1 -right-1 bg-primary text-white text-xs w-5 h-5 rounded-full">0</span></a>
      <div id="user-menu" class="hidden">
        <span id="user-name" class="text-primary font-semibold mr-2"></span>
        <button id="logout-btn" class="text-sm bg-surface-container-low px-3 py-1 rounded-full hover:bg-surface-container transition">Sair</button>
      </div>
      <a href="/login" id="login-link" class="text-primary font-semibold hover:underline">Entrar</a>
    </div>
  </div>
</header>

<main class="pt-24 pb-32 px-4 max-w-4xl mx-auto">
  <h1 class="text-2xl font-bold text-primary mb-6">Meus Pedidos</h1>
  <div id="orders-container" class="space-y-4">
    <div class="text-center py-8">Carregando pedidos...</div>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const totalItems = cart.reduce((sum, i) => sum + (i.quantity || 1), 0);
    document.getElementById('cart-count').innerText = totalItems;
  }
  updateCartCount();

  // Verificar autenticação e carregar pedidos
  async function loadOrders() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = '/login';
      return;
    }

    const userId = session.user.id;

    // Buscar pedidos do usuário
    const { data: orders, error } = await supabaseClient
      .from('orders')
      .select('*')
      .eq('user_id', userId)
      .order('created_at', { ascending: false });

    if (error) {
      console.error(error);
      document.getElementById('orders-container').innerHTML = '<div class="text-center py-8 text-error">Erro ao carregar pedidos.</div>';
      return;
    }

    if (!orders || orders.length === 0) {
      document.getElementById('orders-container').innerHTML = `
        <div class="text-center py-8 bg-white rounded-2xl shadow-sm">
          <span class="material-symbols-outlined text-5xl text-on-surface-variant mb-2">receipt</span>
          <p class="text-on-surface-variant">Você ainda não fez nenhum pedido.</p>
          <a href="/cardapio" class="inline-block mt-4 bg-primary text-white px-6 py-2 rounded-full">Fazer pedido</a>
        </div>
      `;
      return;
    }

    // Gerar HTML para cada pedido
    const ordersHtml = orders.map(order => {
      const date = new Date(order.created_at).toLocaleString('pt-BR');
      const total = (order.total_cents / 100).toFixed(2).replace('.', ',');
      const statusMap = {
        received: 'Recebido',
        preparing: 'Preparando',
        ready: 'Pronto',
        delivered: 'Entregue',
        canceled: 'Cancelado'
      };
      const statusClass = {
        received: 'bg-secondary-container text-on-secondary-container',
        preparing: 'bg-warning/20 text-warning',
        ready: 'bg-info/20 text-info',
        delivered: 'bg-success/20 text-success',
        canceled: 'bg-error-container text-error'
      }[order.status] || 'bg-gray-200 text-gray-800';

      return `
        <div class="bg-white rounded-2xl p-5 shadow-sm order-card">
          <div class="flex flex-wrap justify-between items-start gap-2">
            <div>
              <span class="font-mono font-bold">Pedido #${order.id.slice(0,8)}</span>
              <p class="text-sm text-on-surface-variant">${date}</p>
            </div>
            <span class="px-3 py-1 rounded-full text-xs font-bold ${statusClass}">${statusMap[order.status] || order.status}</span>
          </div>
          <div class="mt-3 flex justify-between items-center">
            <span class="text-xl font-bold text-primary">R$ ${total}</span>
            <a href="/acompanhamento?id=${order.id}" class="text-secondary hover:underline">Acompanhar</a>
          </div>
        </div>
      `;
    }).join('');

    document.getElementById('orders-container').innerHTML = ordersHtml;

    // Atualizar cabeçalho com nome do usuário
    const { data: profile } = await supabaseClient
      .from('profiles')
      .select('name')
      .eq('id', userId)
      .single();
    const userName = profile?.name || session.user.email.split('@')[0];
    document.getElementById('user-name').innerText = userName;
    document.getElementById('user-menu').classList.remove('hidden');
    document.getElementById('login-link').classList.add('hidden');
  }

  // Logout
  document.getElementById('logout-btn')?.addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    localStorage.removeItem('cart');
    window.location.href = '/';
  });

  loadOrders();
</script>
</body>
</html>

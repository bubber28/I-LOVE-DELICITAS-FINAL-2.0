<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Meu Pedido - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ae2f34",
          "primary-container": "#ff6b6b",
          "secondary": "#006a65",
          "surface": "#fff8f7",
          "on-surface": "#251818",
          "on-surface-variant": "#584140",
          "surface-container-low": "#fff0ef",
          "error": "#ba1a1a"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background-color: #fff8f7; }
</style>
</head>
<body class="bg-surface text-on-surface font-body">

<!-- 🌍 COMPONENTES GLOBAIS -->
<div id="global-header"></div>
<div id="global-sidebar"></div>
<script src="/src/components/header.js"></script>
<script src="/src/components/sidebar.js"></script>

<main class="pt-24 pb-32 px-4 max-w-md mx-auto text-center">
  <div class="bg-white rounded-3xl p-8 shadow-xl">
    <span class="material-symbols-outlined text-6xl text-primary mb-4">receipt_long</span>
    <h1 class="text-2xl font-headline font-bold text-on-surface mb-2">Meu Pedido</h1>
    
    <div id="message-container">
      <p class="text-on-surface-variant mb-6">Verificando seu pedido ativo...</p>
    </div>

    <a href="/" class="inline-block bg-primary text-white px-6 py-3 rounded-full font-semibold hover:bg-primary/90 transition">
      Voltar ao início
    </a>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const totalItems = cart.reduce((sum, i) => sum + (i.quantity || 1), 0);
    const el = document.getElementById('cart-count');
    if (el) el.innerText = totalItems;
  }
  updateCartCount();

  function getGuestId() {
    let guestId = localStorage.getItem('guest_id');
    if (!guestId) {
      guestId = 'guest_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('guest_id', guestId);
    }
    return guestId;
  }

  async function verificarPedidoAtivo() {
    const container = document.getElementById('message-container');
    const pedidoAtivoStr = localStorage.getItem('pedidoAtivo');
    
    if (!pedidoAtivoStr) {
      container.innerHTML = `
        <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6">
          <span class="material-symbols-outlined text-4xl text-amber-600 mb-2">info</span>
          <p class="text-on-surface-variant">Você não possui um pedido ativo no momento.</p>
          <p class="text-sm text-on-surface-variant mt-2">Que tal explorar nosso cardápio?</p>
        </div>
        <a href="/cardapio" class="inline-block bg-secondary text-white px-6 py-3 rounded-full font-semibold hover:bg-secondary/90 transition">
          Ver Cardápio
        </a>
      `;
      return;
    }

    try {
      const pedido = JSON.parse(pedidoAtivoStr);
      const orderId = pedido.id;
      
      const { data: order, error } = await supabaseClient
        .from('orders')
        .select('status, delivered_at')
        .eq('id', orderId)
        .single();

      if (error || !order) {
        localStorage.removeItem('pedidoAtivo');
        container.innerHTML = `
          <div class="bg-red-50 border border-red-200 rounded-xl p-4 mb-6">
            <span class="material-symbols-outlined text-4xl text-error mb-2">error</span>
            <p class="text-error">Pedido não encontrado ou expirado.</p>
          </div>
        `;
        return;
      }

      const guestId = getGuestId();
      window.location.href = `/acompanhamento?id=${orderId}&guest_id=${guestId}`;
      
    } catch (e) {
      console.error('Erro ao processar pedido ativo:', e);
      container.innerHTML = `
        <div class="bg-red-50 border border-red-200 rounded-xl p-4 mb-6">
          <span class="material-symbols-outlined text-4xl text-error mb-2">error</span>
          <p class="text-error">Erro ao localizar pedido. Tente novamente.</p>
        </div>
      `;
    }
  }

  // Inicialização
  verificarPedidoAtivo();
</script>
</body>
</html>

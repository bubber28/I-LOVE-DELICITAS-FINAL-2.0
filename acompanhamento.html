<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Acompanhamento - I Love Delicitas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ae2f34",
          "primary-container": "#ff6b6b",
          "secondary": "#006a65",
          "surface": "#fff8f7",
          "on-surface": "#251818",
          "on-surface-variant": "#584140",
          "surface-container-low": "#fff0ef",
          "error": "#ba1a1a"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .custom-glass { background: rgba(255, 248, 247, 0.7); backdrop-filter: blur(12px); }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  body { min-height: 100dvh; }
</style>
</head>
<body class="bg-surface font-body text-on-surface antialiased no-scrollbar">

<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl flex justify-between items-center px-6 py-4 shadow-none">
  <div class="flex items-center gap-4">
    <a href="/" class="text-on-surface hover:opacity-80 transition-opacity scale-95 active:scale-90">
      <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <h1 class="font-headline font-bold tracking-tight text-2xl italic text-primary">I Love Delicitas</h1>
  </div>
  <div class="flex items-center gap-3">
    <div class="h-10 w-10 rounded-full overflow-hidden border-2 border-primary-container">
      <img alt="Perfil" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBrB1jnbA2gIJ-kdDN8sArPx8j7g1b5jDsarA7z0ZVBopGUkbbi2jGJoR9OeeBx90nWZkRrzLiqH-Ed_1hq9dNF00_NxF__obhY3VoL3lZsK6v0pLskdnNjbNP_DKUKCKadFdlOwbZQhsZ7IjvBv-L9psvN5sy0i3WvoEO-kDWVgRzsqkWQqiXj6oXYPjPCl5C8NxJ6FthWX0U2WvMSSX7bnB9aNyzI8c-F6z3ZFO6O9yRKJf-PSAbZV_58FtvC6QCTdrEDRPIdvZA_"/>
    </div>
  </div>
</header>

<main class="pt-24 pb-32 px-4 max-w-md mx-auto" id="main-content">
  <div class="text-center py-10">Carregando pedido...</div>
</main>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-white/80 backdrop-blur-lg rounded-t-[3rem] shadow-[0_-10px_40px_rgba(37,24,24,0.06)] bg-[#fff0ef]">
  <a href="/" class="flex flex-col items-center justify-center text-on-surface opacity-60 hover:bg-[#ffe9e7] rounded-full transition-colors p-2">
    <span class="material-symbols-outlined">home_app_logo</span>
    <span class="text-xs font-semibold">Home</span>
  </a>
  <a href="/acompanhamento" class="flex flex-col items-center justify-center bg-primary text-white rounded-full px-5 py-2">
    <span class="material-symbols-outlined">local_shipping</span>
    <span class="text-xs font-semibold">Tracking</span>
  </a>
  <a href="/cardapio" class="flex flex-col items-center justify-center text-on-surface opacity-60 hover:bg-[#ffe9e7] rounded-full transition-colors p-2">
    <span class="material-symbols-outlined">cake</span>
    <span class="text-xs font-semibold">Treats</span>
  </a>
  <a href="/perfil" class="flex flex-col items-center justify-center text-on-surface opacity-60 hover:bg-[#ffe9e7] rounded-full transition-colors p-2">
    <span class="material-symbols-outlined">person</span>
    <span class="text-xs font-semibold">Account</span>
  </a>
</nav>

<script>
  const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Mapeamento de status para índice (0 a 4)
  const statusIndex = {
    'received': 0,
    'preparing': 1,
    'ready': 2,
    'delivered': 3,
    'canceled': -1
  };

  const statusLabels = {
    'received': 'Recebido',
    'preparing': 'Preparando',
    'ready': 'Pronto',
    'delivered': 'Entregue',
    'canceled': 'Cancelado'
  };

  async function loadOrder() {
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');
    if (!orderId) {
      document.getElementById('main-content').innerHTML = `
        <div class="text-center py-10">
          <span class="material-symbols-outlined text-6xl text-error mb-4">error</span>
          <p class="text-on-surface-variant">Pedido não identificado.</p>
          <a href="/" class="mt-4 inline-block bg-primary text-white px-6 py-2 rounded-full">Voltar ao início</a>
        </div>
      `;
      return;
    }

    // Buscar pedido
    const { data: order, error } = await supabaseClient
      .from('orders')
      .select('*')
      .eq('id', orderId)
      .single();

    if (error || !order) {
      document.getElementById('main-content').innerHTML = `
        <div class="text-center py-10">
          <span class="material-symbols-outlined text-6xl text-error mb-4">error</span>
          <p class="text-on-surface-variant">Pedido não encontrado.</p>
          <a href="/" class="mt-4 inline-block bg-primary text-white px-6 py-2 rounded-full">Voltar ao início</a>
        </div>
      `;
      return;
    }

    // Buscar itens do pedido
    const { data: items } = await supabaseClient
      .from('order_items')
      .select('product_name, quantity, unit_price_cents, line_total_cents')
      .eq('order_id', orderId);

    const date = new Date(order.created_at);
    const formattedDate = date.toLocaleString('pt-BR');
    const total = (order.total_cents / 100).toFixed(2).replace('.', ',');
    const status = order.status;
    const currentStep = statusIndex[status] ?? -1;

    // Gerar HTML dos itens
    let itemsHtml = '';
    if (items && items.length) {
      itemsHtml = items.map(item => `
        <div class="col-span-2 bg-surface-container-low p-5 rounded-lg flex items-center gap-4">
          <div class="w-16 h-16 rounded-md overflow-hidden bg-white flex-shrink-0">
            <img src="https://placehold.co/300x200?text=Delícia" alt="${escapeHtml(item.product_name)}" class="w-full h-full object-cover">
          </div>
          <div class="flex-grow">
            <p class="font-bold text-on-surface">${escapeHtml(item.product_name)}</p>
            <p class="text-sm text-on-surface-variant">Qty: ${item.quantity} • R$ ${(item.line_total_cents / 100).toFixed(2).replace('.', ',')}</p>
          </div>
        </div>
      `).join('');
    } else {
      itemsHtml = '<div class="col-span-2 text-center text-on-surface-variant py-4">Itens não disponíveis</div>';
    }

    // Calcular progresso da barra (0% a 100%)
    let progressPercent = 0;
    if (currentStep >= 0) {
      progressPercent = (currentStep / 3) * 100;
    }

    // Gerar os dots de status
    const steps = ['received', 'preparing', 'ready', 'delivered'];
    const stepsLabels = ['Recebido', 'Preparando', 'Pronto', 'Entregue'];
    const icons = ['receipt', 'cooking', 'check_circle', 'local_shipping'];
    const dotHtml = steps.map((step, idx) => {
      const isActive = currentStep >= idx;
      const isCurrent = currentStep === idx;
      const icon = isCurrent && step !== 'delivered' ? icons[idx] : null;
      return `
        <div class="flex flex-col items-center gap-2 flex-1">
          <div class="relative">
            ${icon ? `
              <div class="w-8 h-8 rounded-full bg-secondary text-white flex items-center justify-center shadow-lg shadow-secondary/20">
                <span class="material-symbols-outlined text-sm">${icon}</span>
              </div>
            ` : `
              <div class="w-4 h-4 rounded-full ${isActive ? 'bg-secondary' : 'bg-surface-container-highest'} border-4 border-surface-container-lowest"></div>
            `}
          </div>
          <span class="text-[10px] font-bold ${isActive ? 'text-secondary' : 'text-on-surface opacity-40'}">${stepsLabels[idx]}</span>
        </div>
      `;
    }).join('');

    // Se cancelado, mostrar mensagem especial
    if (status === 'canceled') {
      document.getElementById('main-content').innerHTML = `
        <div class="text-center py-10">
          <span class="material-symbols-outlined text-6xl text-error mb-4">cancel</span>
          <p class="text-on-surface-variant font-bold">Este pedido foi cancelado.</p>
          <p class="text-sm text-on-surface-variant mt-2">Se precisar de ajuda, entre em contato.</p>
          <a href="/" class="mt-6 inline-block bg-primary text-white px-6 py-2 rounded-full">Voltar ao início</a>
        </div>
      `;
      return;
    }

    // Montar página
    const mainHtml = `
      <!-- Live Map Section -->
      <section class="relative mb-8 h-80 rounded-xl overflow-hidden shadow-2xl shadow-on-surface/5">
        <div class="absolute inset-0 bg-surface-container-low">
          <img alt="Mapa" class="w-full h-full object-cover grayscale-[20%] sepia-[10%] opacity-90" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBojNTdVPhwsNPpaWiopqWBqCQEXRFPcdu4Ceclgil7Y7Yd0dUh8XF7xBUpEuAQL-5to8322XzejTfo7A-2s4MyGK-qKWfQb3GdV-qn8Vy0702pojMXWmaFp4-4T3uEDOk_H8zQXlffFWqPXZbZaQhJ3J7CeCRhntZyhcGgECvn9strwN4oH8TafwXFLjnzglXq6gB0ZNt0GgK6zPQ9Er8shxG6aIP5U3yr77CSnKXjJsL2ls5myj039SPsxPD_suLsFc66sorIacli"/>
        </div>
        <div class="absolute bottom-4 left-4 right-4 custom-glass p-4 rounded-lg flex items-center justify-between">
          <div>
            <p class="text-xs font-bold text-primary uppercase tracking-widest mb-1">Tempo estimado</p>
            <p class="text-2xl font-headline font-extrabold text-on-surface">30-45 min</p>
          </div>
          <div class="bg-primary p-3 rounded-full text-white shadow-lg shadow-primary/30">
            <span class="material-symbols-outlined">moped</span>
          </div>
        </div>
      </section>

      <!-- Order Info Card -->
      <div class="bg-surface-container-lowest p-6 rounded-lg mb-6 shadow-sm">
        <div class="flex justify-between items-start mb-4">
          <div>
            <h2 class="font-headline font-bold text-lg">Pedido #${order.id.slice(0,8)}</h2>
            <p class="text-on-surface-variant text-sm">${formattedDate}</p>
          </div>
          <span class="bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full text-xs font-bold">${statusLabels[status]}</span>
        </div>

        <!-- Delivery Progress -->
        <div class="relative py-8">
          <div class="absolute top-1/2 left-0 w-full h-2 bg-surface-container rounded-full -translate-y-1/2"></div>
          <div class="absolute top-1/2 left-0 h-2 bg-secondary rounded-full -translate-y-1/2" style="width: ${progressPercent}%"></div>
          <div class="relative flex justify-between">
            ${dotHtml}
          </div>
        </div>
      </div>

      <!-- Items Summary -->
      <div class="grid grid-cols-2 gap-4 mb-8">
        ${itemsHtml}
        <div class="bg-surface-container-low p-4 rounded-lg">
          <p class="text-[10px] font-bold uppercase tracking-widest text-primary mb-1">Entregador</p>
          <div class="flex items-center gap-2">
            <img alt="Driver" class="w-6 h-6 rounded-full" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCHEIh9qOtNIo_FpilY_CZNF53FA8G-y30YOC37qc2_3gPKUiJDE-pYE9mmGWsToVrueAYWJ5ggvgS1MJjsHy635P8W6hBsp1qyLpdOrYZ4ZxTQ-8KzgdUeb1MS3QQfyY9H1Csmulivk3MPq2N6j0FLKcdhgJmDw4FrXlAsG0mn9JvKcA2y73u0SEkAC3komhfAWshiMOE0-_DIU_3zqp9MenpRhsyjsrJiOqmtiR63086qGFnznsGddx3TZPtqCZadeMkMjyJmBdKq"/>
            <p class="font-bold text-sm">Marco R.</p>
          </div>
        </div>
        <button onclick="contactDriver()" class="bg-secondary text-white rounded-lg p-4 font-bold flex items-center justify-center gap-2 hover:opacity-90 transition-opacity">
          <span class="material-symbols-outlined text-base">chat_bubble</span>
          Contatar
        </button>
      </div>

      <div class="text-center">
        <a href="https://wa.me/5511999999999?text=Olá! Preciso de ajuda com meu pedido #${order.id.slice(0,8)}" target="_blank" class="text-primary font-bold text-sm underline underline-offset-4 hover:text-primary-fixed-variant transition-colors">
          Precisa de ajuda com este pedido?
        </a>
      </div>
    `;

    document.getElementById('main-content').innerHTML = mainHtml;
  }

  function contactDriver() {
    alert('Em breve você poderá conversar com o entregador pelo app. Por enquanto, entre em contato pelo suporte.');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  }

  loadOrder();
</script>
</body>
</html>

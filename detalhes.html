<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DEBUG: Detalhes do Pedido - I Love Delícias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; background: #fff8f7; }
        .debug-box { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 12px; margin-bottom: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body class="p-4">

<div class="max-w-xl mx-auto">
    <div id="debug-console" class="debug-box"></div>

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-[#ae2f34]">Pedido #<span id="order-id-title">...</span></h1>
        <button onclick="window.history.back()" class="bg-gray-200 px-4 py-2 rounded-full font-bold text-sm">Voltar</button>
    </div>

    <div id="main-content" class="bg-white rounded-3xl p-6 shadow-lg border border-red-50">
        <div id="loader" class="text-center py-10">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-[#ae2f34] border-t-transparent rounded-full mb-2"></div>
            <p class="text-gray-500">Buscando no banco de dados...</p>
        </div>
        
        <div id="order-data" class="hidden space-y-6">
            </div>
    </div>
</div>

<script>
    const LOG = document.getElementById('debug-console');
    const DATA_DIV = document.getElementById('order-data');
    const LOADER = document.getElementById('loader');

    function debug(msg) {
        LOG.style.display = 'block';
        LOG.innerHTML += `> ${msg}<br>`;
    }

    async function init() {
        debug("Iniciando script...");
        
        // 1. Verificar se o ID está na URL
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) {
            debug("ERRO: Nenhum 'id' encontrado na URL (?id=XXX)");
            LOADER.innerHTML = "<b class='text-red-500'>ID do pedido não informado!</b>";
            return;
        }
        document.getElementById('order-id-title').innerText = id.slice(0,6).toUpperCase();
        debug(`ID detectado: ${id}`);

        // 2. Tentar conectar ao Supabase
        try {
            const SUPABASE_URL = 'https://bizrnjpmsyxdsflgpxcl.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_l4xxVaXF8srM0JldOJob0Q_2ZRrXFdR';
            
            if (typeof supabase === 'undefined') {
                throw new Error("Biblioteca Supabase não carregou!");
            }

            const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            debug("Conexão Supabase iniciada.");

            // 3. Buscar Pedido
            const { data: order, error: orderErr } = await _supabase
                .from('orders')
                .select('*')
                .eq('id', id)
                .maybeSingle();

            if (orderErr) throw orderErr;
            if (!order) {
                debug("AVISO: Pedido não encontrado na tabela 'orders'.");
                LOADER.innerHTML = "Pedido inexistente.";
                return;
            }
            debug("Dados do pedido recebidos.");

            // 4. Buscar Itens
            const { data: items, error: itemsErr } = await _supabase
                .from('order_items')
                .select('*')
                .eq('order_id', id);
            
            if (itemsErr) debug("Erro ao buscar itens, mas vou seguir com o pedido.");

            render(order, items || []);

        } catch (e) {
            debug(`FATAL: ${e.message}`);
            LOADER.innerHTML = "<b class='text-red-500'>Erro crítico. Veja o log acima.</b>";
        }
    }

    function render(order, items) {
        LOADER.style.display = 'none';
        DATA_DIV.classList.remove('hidden');

        const total = (order.total_cents / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        let itemsHtml = items.map(i => `
            <div class="flex justify-between border-b py-2 text-sm">
                <span><b>${i.quantity}x</b> ${i.product_name}</span>
                <span class="font-bold">R$ ${(i.line_total_cents/100).toFixed(2)}</span>
            </div>
        `).join('');

        DATA_DIV.innerHTML = `
            <div class="border-b pb-4">
                <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold uppercase">${order.status}</span>
                <p class="mt-2 text-gray-600"><b>Cliente:</b> ${order.customer_name || 'Não informado'}</p>
                <p class="text-gray-600"><b>Endereço:</b> ${order.delivery_address || 'Retirada'}</p>
            </div>
            
            <div>
                <h3 class="font-bold text-[#ae2f34] mb-2">Itens:</h3>
                ${itemsHtml || 'Sem itens cadastrados.'}
            </div>

            <div class="text-right pt-4 border-t">
                <p class="text-2xl font-black text-[#ae2f34]">${total}</p>
            </div>

            <button onclick="copiar('${order.delivery_address}')" class="w-full bg-[#ae2f34] text-white py-4 rounded-2xl font-bold">
                Copiar Endereço
            </button>
        `;
    }

    function copiar(txt) {
        navigator.clipboard.writeText(txt);
        alert("Copiado, papai!");
    }

    init();
</script>

</body>
</html>
